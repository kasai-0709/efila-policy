                                                                                                                                                                                 行動イメージ：目の前の課題や不具合を処理する、制度変更や法令に対処する。


4．守破離（しゅはり）
                                                                                                                                                                                 日本の伝統文化や武道、茶道、芸道などで使われる学びと成長のプロセスを示す言葉で、今はビジネスや教育の場でも使用される。
                                                                                                                                                                                 まずはマネから入り、応用につながっていく。いきなり応用ではないという考え方。
                                                                                                                                                                                 ピカソは最初から今の技法ではなく写実技法を徹底して練習したところから始まっている。料理は最初はレシピ通りに作ることから始めるし、書道も模写から始める。
                                                                                                                                                                                 マニュアルは守破離で考え、応用をさらにマニュアルに落とすことが望ましい。一方、ルールは応用を想定しないため守破離の考えはそぐわない。
守破離の意味
                                                                                                                                                                                 守（しゅ）：師匠や流派の教え・型・規則を忠実に守り、基礎を徹底的に身につける段階。「なぜこうするのか」は後回しで、とにかく形を正しく反復練習する。
                                                                                                                                                                                 破（は）：基礎が身についた後、他流派や他の方法も取り入れて型を破り、理解を深める段階。既存の型に自分なりの工夫や解釈を加える。
                                                                                                                                                                                 離（り）：型や流派の枠を離れ、完全に自分のスタイルを確立する段階。もはや「型」に縛られず、本質を体現する。


5．TTP（徹底的にパクる）
                                                                                                                                                                                 徹底（T）的（T）にパクる（P）の略。
                                                                                                                                                                                 勝手にアレンジを加えずに徹底した模倣、マネが重要という考え方。
                                                                                                                                                                                 守破離にもつながるが、何事もまずはマネから始める。
                                                                                                                                                                                 他者でうまくいっているものは既に「うまくいくことが証明」されたもの。まずはその通りやれば、その状態にまではなれる。いったんまねて、そこから発展させればいい。その方が時間の短縮にもなる。


6．事実と解釈
                                                                                                                                                                                 事実と解釈を混同させてしまいがちなので、分けて考える必要がある。
                                                                                                                                                                                 事実は１つしかなく、解釈は複数ある。
                                                                                                                                                                                 事実は客観的なものであり、誰が見ても同じもの。解釈は主観であり、人それぞれのとらえ方がある。
                                                                                                                                                                                 事実から解釈が生まれるが、解釈を事実と錯覚することがある。
                                                                                                                                                                                 事実は何なのかを明確にすることが重要。
                                                                                                                                                                                 例：Aさんはやる気がない→解釈。／離職率が高い→解釈（高いか低いかは主観のため）。
                                                                                                                                                                                 部下からの報告が事実なのか解釈なのか分けて報告しないと判断を間違える。また、部下側は報告を事実と解釈をわけて報告する必要がある。


7．制限要因
                                                                                                                                                                                 制限要因は「内部環境がよくない」「こういう人材がいない」「問題あるメンバーがいる」など、目標達成ややりたいことをやる上でのハードルになっていることを指す。
                                                                                                                                                                                 この制限要因を前提に達成を考えるのではなく、制限要因をどうなくしていくか、その状況を解消させるかを考える。
                                                                                                                                                                                 制限要因を理由に「仕方ない」などの諦めになり、責任がないかのように錯覚することがあるが、あらゆる制限要因は解消させることができると考える。
                                                                                                                                                                                 どうやったらそれを乗り越えられるのかの視点。


8．第一象限・第二象限


 カレンダー が含まれている画像

AI 生成コンテンツは誤りを含む可能性があります。 

                                                                                                                                                                                 役職者ほど第二象限に時間を使うべき。
                                                                                                                                                                                 役職者は未来を作っていくことが仕事であり、その仕事は第二象限にしかない。それなのに、第二象限に使う時間が第一象限より少ないどころかまったく考えることがない状態になってしまうことがある。
                                                                                                                                                                                 第二象限に時間を使えない限り、今の延長にしか未来はなく、思い描いた通りの将来はやってこない。
                                                                                                                                                                                 また、逆説的だが、第二象限の仕事をしないから、第一象限が増え続けるということもある。（組織体制や風土を作らないから離職が増えて現場対応が増える、部下の教育をしていないから自分がやらざるを得ない、など。）
                                                                                                                                                                                 第二象限から第一象限に持ってくるためには、タスク化し、スケジュールに入れること。スケジュールに入れると、第二象限にあるようなものが第一象限化する。


9．目的先行と手段先行
                                                                                                                                                                                 目的から実行すべきことを考えることを目的先行、手段から考えることを手段先行と呼ぶ。
                                                                                                                                                                                 仕事をする上では目的先行で考えるべきで、手段先行はNG。
                                                                                                                                                                                 意図せず手段先行をする場合が多い。
                                                                                                                                                                                 常に目的は何か、何のためにやるのかを最初に考える必要がある。
                                                                                                                                                                                 目的先行で考えると、今考えている手段よりもっといい考えが浮かぶ可能性もある。
                                                                                                                                                                                 目的を考えたうえで、必要なければやらない。
                                                                                                                                                                                 手段先行の例：「次のイベント何をしようか」「会議でどんなことを話すか」「拠点での研修内容をどうしようか」などの視点での議論。何をするかよりもまず何のためにやるのかをすり合わせないと、目的とずれたことになっていく。
                                                                                                                                                                                 目的先行の例：「会議を開催しようと思っているが、まずは何のためにやろうと思っているのか目的を確認する。その後、その目的に沿った内容を考える。」


10．凡事徹底
                                                                                                                                                                                 当たり前のことを徹底すること。私たちではルールやマニュアル通りにやることを指す。
                                                                                                                                                                                 一方で「常識」としての当たり前については、凡事に入らないという解釈。人によって常識が異なるため、それを相手に求めるのは難しい。
                                                                                                                                                                                 ただし、自身でルールに規定されていること以外で凡事だと思うことを徹底することは良い。規定されていないことを相手に求めさえしなければ自身で徹底することはいいこと。


11．気迫
                                                                                                                                                                                 単なる「勢い」や「根性」ではなく、本気の想いが行動に宿った状態。
                                                                                                                                                                                 「どうしても成し遂げたい」「絶対に守りたい」という強い意志が、態度・行動・発言に滲み出ること。
                                                                                                                                                                                 「うまくいったらいい」「できるだけがんばる」という程度の心理からは気迫は生まれない。「どうしても達成させる」という退路を断った状態で始めて生まれる。
                                                                                                                                                                                 リーダーの気迫が、チーム全体の空気を変える。
                                                                                                                                                                                 気迫があるから、達成させるための「どうしたらできるか」の発想になり、あらゆる手段を考えられるゆえに結果につながる。


12. 是正する
                                                                                                                                                                                 何か問題が起きた後に、「是正すること」と指示があった場合は、「再発しないような仕組みやルールを作り、その仕組みが機能しているか確認するところまで実施すること」を指す。
                                                                                                                                                                                 「再発しないように意識する」程度の話ではない。それでは別のメンバーがまた同じことを起こしてしまう可能性が残る。
                                                                                                                                                                                 新しいメンバーが入っても同様の問題が発生しないようにするためには仕組みから変えないといけない。


Ⅲ．その他一般固有名詞
1．レギュラーメンバー
                                                                                                                                                                                 一般メンバーのことを指す。
                                                                                                                                                                                 管理職以外のメンバーすべてを指す。
                                                                                                                                                                                 「一般」というと格が下のような印象を与えてしまうことがあるが、実際はそういうことではなく役割の違いであるため、そのような印象にならない表現とした。


2．管理者と拠点長
                                                                                                                                                                                 管理者と拠点長を同義で扱ってしまうことがあるが別物である。
                                                                                                                                                                                 管理者という表現はややこしいので特定の用法以外では使用しないこととする。
                                                                                                                                                                                 管理者：介護保険や児童福祉法上の届け出をしている管理者を指す。拠点のマネジメントをしている役職者とは別物。管理者＝法令上管理者。
                                                                                                                                                                                 拠点長：組織のマネジメントをするものであり、組織の責任を負う者。社内上の役職であり、介護保険上の管理者とは異なる。


3．法令上管理者
                                                                                                                                                                                 介護保険法や児童福祉法上で、届け出をしている管理者のことを指す。
                                                                                                                                                                                 拠点長と同一人物になることも多いが、イコールではない。
                                                                                                                                                                                 防火管理者は消防における管理者を指し、食品衛生管理者は食品衛生に対しての管理者であるのと同様の位置づけ。
                                                                                                                                                                                 組織の責任を負うのは組織図上の役職者であり、法令上管理者は役職ではない。


4．管理職
                                                                                                                                                                                 部下を持つものを管理職と呼ぶ。
                                                                                                                                                                                 管理者とは別物。
                                                                                                                                                                                 エフィラでは拠点長、ブロック長、事業責任者、課長、部長など。


5．TK
                                                                                                                                                                                 私たち以外の外部の企業を指す。（他社競合、取り残す企業、他社企業、隣の企業などから）
                                                                                                                                                                                 私たちのミッション・ビジョンとは異なるものを目指している組織。
                                                                                                                                                                                 上場企業などは株主がいるため、原資がでない出店はできず、原資至上主義にならざるを得ない。


6．えふぃらいふ
                                                                                                                                                                                 エフィラの社内報のこと。
                                                                                                                                                                                 全体で何をしているかわかりにくいので全体の活動をメンバーに紹介することやエフィラのニュースを届けることが目的。
                                                                                                                                                                                 イントラで見ることもできるが、拠点ごとに紙でも配布している。紙が配られることで、ちゃんと読んでもらえるようにすることを目指している。


7．課題図書・推奨図書
                                                                                                                                                                                 マネジメント職は価値観をそろえることが重要でそのための手法として共通の本を読むことにしている。
                                                                                                                                                                                 また、管理職は常に人格を高めたり、学びを続ける必要があり、その一環として書籍を読むことを求める。
                                                                                                                                                                                 ただし、課題図書に記載があるものすべてが会社にとっての正解とは限らない。マネジメントマニュアルやルールに記載あることと異なることが記載されていることもある。
                                                                                                                                                                                 その場合は、マニュアルやルールが正解であり、書籍に記載されていることは無視していいということになる。
                                                                                                                                                                                 書籍はあくまでも知識の幅を広げる参考図書とし、課題書籍に記載あることが全て会社にとっての正解とはならない。


8．基準勤務時間
                                                                                                                                                                                 拠点ごとに使用できる総労働時間を指す。これくらいの総労働時間でシフトを作り、拠点運営をしてほしいとする時間。
                                                                                                                                                                                 パートナーが多い少ない、月間の日数が３０日なのか３１日なのか、パートナーの性質、最低配置すべき人員数などを考慮し、拠点ごとに算出する。
                                                                                                                                                                                 拠点の置かれている状況を踏まえて設定するため、大きい拠点が有利とか不利とか拠点ごとの公平性を保てる工夫がされている。
                                                                                                                                                                                 拠点からすると、人が足りない、足りている、の判断は拠点長やそこにいるメンバーの主観になってしまうため、数値でメンバーの過不足を表示できる基準が必要ということで設定している。
                                                                                                                                                                                 多くの会社が人件費率などで人件費のコントロールをするが、収入に対しての比率は状況によって異なるため、一律で何％と出すことは困難。
                                                                                                                                                                                 また、人件費という額を使うと、キャリアアップや資格をとったりすると人件費があがることになり、それをさせないようにする誘因が働く懸念がある。
                                                                                                                                                                                 勤務時間は全員平等であるため、時間という概念を使って設定している。


9．LTV
                                                                                                                                                                                 ライフタイムバリューのこと。
                                                                                                                                                                                 一人のパートナーが利用開始から終了までで、会社にもたらす収入や原資の総額。
                                                                                                                                                                                 収入LTVと原資LTVがある。
                                                                                                                                                                                 収入LTV＝ 収入×在籍期間 ＝（収入÷パートナー数）×（パートナー数÷終了パートナー数）
                                                                                                                                                                                 原資LTV＝収入LTV×（１－支出率）
                                                                                                                                                                                 例：収入300万、パートナー数30名、終了パートナー1名の事業 → （300÷30）×（30÷1）= 収入LTV300万円
                                                                                                                                                                                 別の事業を利用していただくことでこのLTVはさらに増える。一人の方をずっと支えていくという意味において、このLTVをあげていくことは私たちにとっては重要である。


10．ピント
                                                                                                                                                                                 ピントとは、部下と会社の方向性のすり合わせを行う面談のことを指す。
                                                                                                                                                                                 語源は 「personal interview」と「ピントを合わせる」に由来する。
                                                                                                                                                                                 部下の「やりたいこと」に合わせて組織を決めるわけではないが、部下が何を考えているかを把握し、その方向性を支援するように上長が動く。
                                                                                                                                                                                 併せて、上長として「こう成長してほしい」「こう導きたい」という期待や方向性を伝える場にする。
                                                                                                                                                                                 メンバー＝会社となるように、理念と個人の方向性を一致させるための重要な面談と位置づける。


11．FA制度
                                                                                                                                                                                 本人の希望により、他事業にローテ（異動）できる制度を指す。
                                                                                                                                                                                 色々な事業をやっているため、このような制度が実施できる。
                                                                                                                                                                                 一つのことをやりながら、キャリアを終えるのではなく、別の事業も経験してみたいというキャリア形成の思考に応えられる。
                                                                                                                                                                                 輩出する側の事業は拒否することはできない。（退職と同じと考える。本来、別の会社に転職をするものをFAで残ってもらったという視点）
                                                                                                                                                                                 一方受け入れ側は、新たな採用という観点で通常の中途採用での採用基準で受け入れるかどうか判断できる。それがないと、受け入れ側からすると不要な人員を増やすことになってしまうため。


12．引き寄せの法則
                                                                                                                                                                                 「自分の思考や感情が、現実の出来事や結果を引き寄せる」法則を指す。
                                                                                                                                                                                 自分の思考と感情が行動を変化させ、その行動の積み重ねが現実の結果を生み出すという原理である。
                                                                                                                                                                                 エフィラでは単なるスピリチュアルな概念ではなく、「偶然の幸運を呼ぶ力」ではなく、脳の認知機能・心理的焦点・行動パターンに基づく再現性のある仕組みと考える。
                                                                                                                                                                                 「引き寄せ」は行動を伴わない願望では成立しない。
                                                                                                                                                                                 推理系小説やアニメで犯行のトリックについてずっと考えているから日常生活の中からヒントに気づけることがあるが、それも似たような話。
                                                                                                                                                                                 例：難しい目標でも本当に達成したいと思っていたら、毎日そればかり考えるようになり、どうやったら達成できるかの思考になり、無意識にいろいろ行動をするようになる。結果、行動が伴うため、達成ができる。


   科学的背景
                                                                                                                                                                                 自己成就予言（Self-fulfilling prophecy）
人は「こうなる」と信じた方向に無意識の行動を変える。結果として、信じた通りの現実を生み出す。

                                                                                                                                                                                 RAS（網様体賦活系）による焦点効果
脳は「自分が重要だと認識した情報」だけを優先的に拾う。
ポジティブな目標を意識している人は、チャンスや支援を見つけやすくなる。

                                                                                                                                                                                 感情と行動の連動
前向きな感情状態は挑戦・創意工夫・協働を促し、結果的に成果の確率を高める。


13．経営計画
                                                                                                                                                                                    経営計画とはエフィラが今後どのように進んでいくかを明文化したもの。
                                                                                                                                                                                    イントラで見ることができる。
                                                                                                                                                                                    ミッション、ビジョン、バリュー（エフィラウェイ）、ポリシーの下位に位置する。
                                                                                                                                                                                    経営計画の留意事項
◦計画における数字は目安であり、絶対にその数字を達成させるためのものではない。計画通りに進んでいったらどうなるかを数字で表したものであり、計画を達成させていったらこのだいたいこの数字になるという観点で作られている。上場企業で作るような経営計画とは異なる。
   ◦数字を達成させることに重きを置くのではなく、ビジョンを実現できるようになるためには、という視点でやらないといけないことが記載されている。
   ◦作成時点での考えであり、一年以内にでも変更の可能性はいくらでもある。
   ◦数値計画を作っても計画通りにいくのは支出だけなので、長期での数値計画は作ら    ない。重要なのは数値ではなく、どういうことをしていくか。
   ◦ここでいう経営計画の数字ついては事業部の目標とは異なる。事業部の目標は短期    的な数字であり、その数字は達成をさせる必要がある。一方で経営計画の数字は長    期的なイメージであり、柔軟性を持たせている。


14．新規スタート、パートナースタート
                                                                                                                                                                                    新規パートナーとの契約（新規契約）を指す。
                                                                                                                                                                                    新規契約獲得＝新規スタート、顧客獲得＝パートナースタートのように使う。
                                                                                                                                                                                    一般的なビジネス用語である「獲得」という言葉は、会社側の都合で「取る」「奪う」というニュアンスが強く、相手を数値やモノとして扱っている印象を与えるため使用しない。
                                                                                                                                                                                    私たちにとっては、契約はゴール（獲得して終わり）ではなく、その方の人生を支える長い関係性の「スタート」である。 また、パートナーにとっても、エフィラのサービスと出会うことで、課題を乗り越え「生ききる」ための新しい人生が「スタート」するという意味を込めている。
                                                                                                                                                                                    成果報告においても、「〇件獲得」ではなく「〇件スタート」と表現する。


15．応募創出、問い合わせ創出
                                                                                                                                                                                    応募獲得＝応募創出、問い合わせ獲得＝問い合わせ創出のように使う。
                                                                                                                                                                                    新規スタート同様、一般的なビジネス用語である「獲得」という言葉は、会社側の都合で「取る」「奪う」というニュアンスが強いため、使用しない。


16．NN
                                                                                                                                                                                    「not now（今はその時ではない）」の略。 
                                                                                                                                                                                    営業活動における「没」や、採用活動における「見送り」「不採用」といった言葉の代わりに用いる表現。
                                                                                                                                                                                    「没」や「不採用」という言葉は、あくまで会社側の都合にすぎず、相手をモノのように扱う印象を受ける。
                                                                                                                                                                                    今回はたまたまご縁がなく形にならなかったとしても、今後もしかしたらまた接点があるかもしれない。
                                                                                                                                                                                     相手への敬意と、「今回はご縁がなかったが、今はその時ではないだけである」という前向きな意味を込めて、この表現を使用する。`
  }
];
</script>

<script>
(function() {
  'use strict';

  // ========== DOM Elements ==========
  var $ = function(id) { return document.getElementById(id); };
  var navList = $('navList');
  var searchInput = $('searchInput');
  var searchResultsCount = $('searchResultsCount');
  var mainContent = $('mainContent');
  var welcome = $('welcome');
  var contentCard = $('contentCard');
  var contentSectionNum = $('contentSectionNum');
  var contentTitle = $('contentTitle');
  var contentSubNav = $('contentSubNav');
  var contentBody = $('contentBody');
  var searchResultsPanel = $('searchResultsPanel');
  var searchResultsSummary = $('searchResultsSummary');
  var searchResultsList = $('searchResultsList');
  var scrollTopBtn = $('scrollTop');
  var menuToggle = $('menuToggle');
  var sidebar = $('sidebar');
  var sidebarOverlay = $('sidebarOverlay');
  var searchShortcut = $('searchShortcut');
  var mobileSidebarFab = $('mobileSidebarFab');

  var activeSection = null;
  var searchTimeout = null;

  // ========== Initialize ==========
  function init() {
    if (typeof POLICY_DATA === 'undefined') {
      welcome.querySelector('p').textContent = 'policy-data.js が読み込めませんでした。';
      return;
    }

    // Set last updated
    if (typeof POLICY_LAST_UPDATED !== 'undefined') {
      $('lastUpdated').textContent = POLICY_LAST_UPDATED;
    }

    // Set doc link
    if (typeof POLICY_DOC_URL !== 'undefined') {
      $('docLink').href = POLICY_DOC_URL;
    }

    // Build navigation
    buildNav();

    // Events
    searchInput.addEventListener('input', onSearchInput);
    scrollTopBtn.addEventListener('click', function() {
      mainContent.scrollTo({ top: 0, behavior: 'smooth' });
    });
    mainContent.addEventListener('scroll', onMainScroll);
    menuToggle.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', function() {
      closeSidebar();
      closeMobileSidebarOverlay();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', onKeyDown);

    // Mac detection for shortcut display
    if (navigator.platform && navigator.platform.indexOf('Mac') > -1) {
      searchShortcut.textContent = '\u2318K';
    }

    // Mobile back button
    var mobileBackBtn = $('mobileBackBtn');
    if (mobileBackBtn) {
      mobileBackBtn.addEventListener('click', mobileGoBack);
    }

    // Mobile sidebar FAB
    if (mobileSidebarFab) {
      mobileSidebarFab.addEventListener('click', openMobileSidebarOverlay);
    }

    // Check URL hash for direct section link
    handleHash();
    window.addEventListener('hashchange', handleHash);
  }

  // ========== Mobile: back to home ==========
  function mobileGoBack() {
    document.body.classList.remove('mobile-content-open');
    document.body.classList.remove('mobile-sidebar-overlay');
    mainContent.scrollTo({ top: 0 });
  }

  // ========== Mobile: open sidebar as overlay ==========
  function openMobileSidebarOverlay() {
    document.body.classList.add('mobile-sidebar-overlay');
  }

  function closeMobileSidebarOverlay() {
    document.body.classList.remove('mobile-sidebar-overlay');
  }

  // ========== Handle URL hash ==========
  function handleHash() {
    var hash = window.location.hash;
    if (hash && hash.startsWith('#sec-')) {
      var idx = parseInt(hash.replace('#sec-', ''), 10) - 1;
      if (idx >= 0 && idx < POLICY_DATA.length) {
        showSection(idx);
      }
    }
  }

  // ========== Build Navigation ==========
  function buildNav() {
    navList.innerHTML = '';

    POLICY_DATA.forEach(function(section, idx) {
      var sectionEl = document.createElement('div');
      sectionEl.className = 'nav-section';
      sectionEl.dataset.index = idx;

      var subSections = detectSubSections(section);
      var hasChildren = subSections.length > 0;

      var item = document.createElement('div');
      item.className = 'nav-item';
      item.dataset.index = idx;

      var numSpan = document.createElement('span');
      numSpan.className = 'nav-num';
      numSpan.textContent = idx + 1;

      var titleSpan = document.createElement('span');
      titleSpan.className = 'nav-item-title';
      titleSpan.textContent = section.title;

      item.appendChild(numSpan);
      item.appendChild(titleSpan);

      if (hasChildren) {
        var expandSpan = document.createElement('span');
        expandSpan.className = 'expand-icon';
        expandSpan.innerHTML = '&#9654;';
        item.appendChild(expandSpan);
      }

      item.addEventListener('click', function(e) {
        onNavClick(idx);
      });
      sectionEl.appendChild(item);

      if (hasChildren) {
        var subNav = document.createElement('div');
        subNav.className = 'sub-nav';
        subNav.dataset.index = idx;

        subSections.forEach(function(sub) {
          var subItem = document.createElement('div');
          subItem.className = 'sub-nav-item';
          subItem.textContent = sub.title;
          subItem.addEventListener('click', function(e) {
            e.stopPropagation();
            onSubNavClick(idx, sub.title);
          });
          subNav.appendChild(subItem);
        });

        sectionEl.appendChild(subNav);
      }

      navList.appendChild(sectionEl);
    });
  }

  // ========== Detect Sub-sections ==========
  function detectSubSections(section) {
    var subs = [];

    // From predefined subsections array
    if (section.subsections && section.subsections.length) {
      section.subsections.forEach(function(s) {
        subs.push({ title: s });
      });
    }

    // From content patterns
    if (section.content) {
      var lines = section.content.split('\n');
      var patterns = [
        /^[\u2160-\u216F][\uff0e\.]\s*(.+)/,       // Roman numerals
        /^[IVX]+[\.\uff0e]\s*(.+)/,                 // Latin roman numerals
        /^[\u2460-\u2473]\s*(.+)/,                   // Circled numbers
      ];

      lines.forEach(function(line) {
        var trimmed = line.trim();
        for (var i = 0; i < patterns.length; i++) {
          if (patterns[i].test(trimmed)) {
            var title = trimmed.length > 50 ? trimmed.substring(0, 50) + '...' : trimmed;
            var isDuplicate = subs.some(function(s) { return s.title === title; });
            if (!isDuplicate) {
              subs.push({ title: title });
            }
            break;
          }
        }
      });
    }

    return subs;
  }

  // ========== Navigation Click ==========
  function onNavClick(idx) {
    // Toggle accordion
    var navItems = document.querySelectorAll('.nav-item');
    var clickedItem = navItems[idx];
    var sectionEl = clickedItem.parentElement;
    var subNav = sectionEl.querySelector('.sub-nav');

    if (subNav) {
      var wasOpen = subNav.classList.contains('open');
      // Close all
      document.querySelectorAll('.sub-nav.open').forEach(function(el) {
        el.classList.remove('open');
        el.parentElement.querySelector('.nav-item').classList.remove('expanded');
      });
      if (!wasOpen) {
        subNav.classList.add('open');
        clickedItem.classList.add('expanded');
      }
    }

    showSection(idx);
    closeSidebar();
  }

  function onSubNavClick(idx, subTitle) {
    showSection(idx);
    closeSidebar();

    // Scroll to sub-section in content after render
    requestAnimationFrame(function() {
      var elements = contentBody.querySelectorAll('.policy-heading-1, .policy-heading-2, .policy-heading-3, .policy-line');
      for (var i = 0; i < elements.length; i++) {
        var el = elements[i];
        if (el.textContent.indexOf(subTitle) >= 0 || subTitle.indexOf(el.textContent.trim()) >= 0) {
          var rect = el.getBoundingClientRect();
          var containerRect = mainContent.getBoundingClientRect();
          mainContent.scrollTo({ top: mainContent.scrollTop + rect.top - containerRect.top - 20, behavior: 'smooth' });
          el.style.transition = 'background 0.3s';
          el.style.background = '#ffeaa7';
          (function(target) {
            setTimeout(function() { target.style.background = 'transparent'; }, 2000);
          })(el);
          break;
        }
      }
    });
  }

  // ========== Show Section ==========
  function showSection(idx) {
    var section = POLICY_DATA[idx];
    if (!section) return;

    activeSection = idx;
    window.location.hash = 'sec-' + (idx + 1);

    // Update nav active state
    document.querySelectorAll('.nav-item').forEach(function(el) {
      var elIdx = parseInt(el.dataset.index, 10);
      if (elIdx === idx) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    });

    // Update content header
    contentSectionNum.textContent = 'SECTION ' + (idx + 1);
    contentTitle.textContent = section.title;

    // Sub-navigation chips in content header
    var subSections = detectSubSections(section);
    contentSubNav.innerHTML = '';
    subSections.forEach(function(sub) {
      var chip = document.createElement('span');
      chip.className = 'content-sub-nav-item';
      chip.textContent = sub.title;
      chip.addEventListener('click', function() {
        var targets = contentBody.querySelectorAll('.policy-heading-1, .policy-heading-2, .policy-heading-3, .policy-line');
        for (var i = 0; i < targets.length; i++) {
          if (targets[i].textContent.indexOf(sub.title) >= 0) {
            var r = targets[i].getBoundingClientRect();
            var cr = mainContent.getBoundingClientRect();
            mainContent.scrollTo({ top: mainContent.scrollTop + r.top - cr.top - 20, behavior: 'smooth' });
            targets[i].style.transition = 'background 0.3s';
            targets[i].style.background = '#ffeaa7';
            (function(t) {
              setTimeout(function() { t.style.background = 'transparent'; }, 2000);
            })(targets[i]);
            break;
          }
        }
      });
      contentSubNav.appendChild(chip);
    });

    // Render content (with active search highlight if any)
    var activeQuery = searchInput.value.trim();
    contentBody.innerHTML = formatContent(section.content, activeQuery || null);

    // Show content card, hide others
    welcome.style.display = 'none';
    searchResultsPanel.classList.remove('visible');
    contentCard.classList.remove('visible');
    // Force reflow for animation
    void contentCard.offsetWidth;
    contentCard.classList.add('visible');

    // Mobile: slide to content panel
    if (window.innerWidth <= 900) {
      document.body.classList.add('mobile-content-open');
      document.body.classList.remove('mobile-sidebar-overlay');
    }

    // Scroll main to top
    mainContent.scrollTo({ top: 0 });
  }

  // ========== Format Content ==========
  function formatContent(text, highlightTerm) {
    if (!text || text.indexOf('\uff08\u30b3\u30f3\u30c6\u30f3\u30c4\u306f') === 0) {
      // Placeholder content
      return '<div class="placeholder-msg">' +
        '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>' +
        '<p>' + escapeHtml(text) + '</p>' +
        '<p style="font-size:0.8rem;margin-top:4px;">policy-data.js にコンテンツを入力してください</p>' +
        '</div>';
    }

    var lines = text.split('\n');
    var html = '';
    var firstContentLine = true;
    var afterKeyTitle = false;

    lines.forEach(function(line) {
      var trimmed = line.trim();

      if (trimmed === '') {
        html += '<div class="policy-empty"></div>';
        return;
      }

      var processed = escapeHtml(trimmed);

      // Highlight search term
      if (highlightTerm) {
        var regex = new RegExp('(' + escapeRegex(highlightTerm) + ')', 'gi');
        processed = processed.replace(regex, '<span class="search-highlight">$1</span>');
      }

      // Detect heading level
      var isKeyTitle = (trimmed === '\u751f\u304d\u304d\u308b' || trimmed === '\u8ab0\u3072\u3068\u308a\u53d6\u308a\u6b8b\u3055\u306a\u3044\u8857\u3092\u3064\u304f\u308b\u3002' || trimmed === 'EFILa WAY');
      var isRoman = /^[\u2160-\u216F][\uff0e\.]/.test(trimmed);
      var isDoubleAngle = /^[\u226A\u300A<\uff1c].+[\u226B\u300B>\uff1e]/.test(trimmed);
      var isCircleNum = /^[\u2460-\u2473]/.test(trimmed);
      var isNumbered = /^[1-9\uff11-\uff19]\d*[\.\uff0e\uff1a:]/.test(trimmed);
      var isBullet = /^[\u30FB\uff65]/.test(trimmed) || /^[\u2022\u25CF\u25CB\u25A0\u25A1\u2023\u2043\u2219\u00B7\-\u30FC]\s/.test(trimmed);
      var indentLevel = line.length - line.trimStart().length;

      if (isKeyTitle) {
        firstContentLine = false;
        afterKeyTitle = true;
        html += '<div class="policy-key-title">' + processed + '</div>';
      } else if (isRoman) {
        firstContentLine = false;
        afterKeyTitle = false;
        html += '<div class="policy-heading-1">' + processed + '</div>';
      } else if (isDoubleAngle) {
        firstContentLine = false;
        afterKeyTitle = false;
        html += '<div class="policy-heading-2">' + processed + '</div>';
      } else if (isCircleNum) {
        firstContentLine = false;
        afterKeyTitle = false;
        html += '<div class="policy-heading-3">' + processed + '</div>';
      } else if (isNumbered) {
        firstContentLine = false;
        afterKeyTitle = false;
        html += '<div class="policy-heading-3">' + processed + '</div>';
      } else if (isBullet) {
        firstContentLine = false;
        afterKeyTitle = false;
        html += '<div class="policy-bullet">' + processed + '</div>';
      } else if (indentLevel >= 4) {
        var level = indentLevel >= 8 ? 2 : 1;
        html += '<div class="policy-indent-' + level + ' policy-line policy-doc-bullet">' + processed + '</div>';
        firstContentLine = false;
        afterKeyTitle = false;
      } else {
        if (firstContentLine) {
          firstContentLine = false;
          html += '<div class="policy-line">' + processed + '</div>';
        } else if (afterKeyTitle) {
          html += '<div class="policy-indent-2 policy-line">' + processed + '</div>';
        } else {
          html += '<div class="policy-indent-2 policy-line policy-doc-bullet">' + processed + '</div>';
        }
      }
    });

    return html;
  }

  // ========== Search ==========
  function onSearchInput() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(performSearch, 250);
  }

  function performSearch() {
    var query = searchInput.value.trim();

    if (!query) {
      clearSearch();
      return;
    }

    var queryLower = query.toLowerCase();

    // Filter nav items
    var sections = document.querySelectorAll('.nav-section');
    var matchCount = 0;

    sections.forEach(function(sectionEl, idx) {
      var section = POLICY_DATA[idx];
      var titleMatch = section.title.toLowerCase().indexOf(queryLower) >= 0;
      var contentMatch = section.content && section.content.toLowerCase().indexOf(queryLower) >= 0;
      var subMatch = section.subsections && section.subsections.some(function(s) {
        return s.toLowerCase().indexOf(queryLower) >= 0;
      });

      if (titleMatch || contentMatch || subMatch) {
        sectionEl.classList.remove('search-hidden');
        matchCount++;
      } else {
        sectionEl.classList.add('search-hidden');
      }
    });

    // Show results count
    searchResultsCount.textContent = matchCount + ' 件のセクションが一致';
    searchResultsCount.style.display = 'block';

    // Build search results in main area
    buildSearchResults(query);
  }

  function buildSearchResults(query) {
    var queryLower = query.toLowerCase();
    var results = [];

    POLICY_DATA.forEach(function(section, idx) {
      var content = section.content || '';
      var titleMatch = section.title.toLowerCase().indexOf(queryLower) >= 0;
      var contentIdx = content.toLowerCase().indexOf(queryLower);

      if (titleMatch || contentIdx >= 0) {
        var snippet = '';
        if (contentIdx >= 0) {
          var start = Math.max(0, contentIdx - 60);
          var end = Math.min(content.length, contentIdx + query.length + 60);
          snippet = (start > 0 ? '...' : '') +
            content.substring(start, end) +
            (end < content.length ? '...' : '');
        } else {
          snippet = content.substring(0, 120) + (content.length > 120 ? '...' : '');
        }

        results.push({ idx: idx, title: section.title, snippet: snippet });
      }
    });

    searchResultsSummary.textContent = '"' + query + '" で ' + results.length + ' 件のセクションに一致しました';
    searchResultsList.innerHTML = '';

    if (results.length === 0) {
      searchResultsList.innerHTML = '<div class="search-no-results">' +
        '<p>&#128269;</p>' +
        '<p>"' + escapeHtml(query) + '" に一致する結果はありませんでした</p>' +
        '</div>';
    } else {
      results.forEach(function(r) {
        var item = document.createElement('div');
        item.className = 'search-result-item';

        var highlightedTitle = escapeHtml(r.title);
        var highlightedSnippet = escapeHtml(r.snippet);
        var regex = new RegExp('(' + escapeRegex(query) + ')', 'gi');
        highlightedTitle = highlightedTitle.replace(regex, '<span class="search-highlight">$1</span>');
        highlightedSnippet = highlightedSnippet.replace(regex, '<span class="search-highlight">$1</span>');

        item.innerHTML =
          '<div class="search-result-section">SECTION ' + (r.idx + 1) + '</div>' +
          '<div style="font-weight:600; margin-bottom:4px;">' + highlightedTitle + '</div>' +
          '<div class="search-result-snippet">' + highlightedSnippet + '</div>';

        item.addEventListener('click', (function(idx, q) {
          return function() {
            showSection(idx);
            // Re-render with highlights
            contentBody.innerHTML = formatContent(POLICY_DATA[idx].content, q);
          };
        })(r.idx, query));

        searchResultsList.appendChild(item);
      });
    }

    // Show search results
    welcome.style.display = 'none';
    contentCard.classList.remove('visible');
    searchResultsPanel.classList.remove('visible');
    void searchResultsPanel.offsetWidth;
    searchResultsPanel.classList.add('visible');
  }

  function clearSearch() {
    searchInput.value = '';
    searchResultsCount.style.display = 'none';

    document.querySelectorAll('.nav-section').forEach(function(el) {
      el.classList.remove('search-hidden');
    });

    searchResultsPanel.classList.remove('visible');

    if (activeSection !== null) {
      // Re-render without highlight
      contentBody.innerHTML = formatContent(POLICY_DATA[activeSection].content, null);
      contentCard.classList.add('visible');
    } else {
      welcome.style.display = '';
    }
  }

  // ========== Keyboard Shortcuts ==========
  function onKeyDown(e) {
    // Ctrl+K or Cmd+K = focus search
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
      // Open sidebar on mobile
      if (window.innerWidth <= 900) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('open');
      }
    }

    // Escape = clear search or close sidebar
    if (e.key === 'Escape') {
      if (searchInput.value) {
        clearSearch();
      }
      searchInput.blur();
      closeSidebar();
    }
  }

  // ========== Scroll ==========
  function onMainScroll() {
    var show = mainContent.scrollTop > 300;
    scrollTopBtn.classList.toggle('visible', show);
  }

  // ========== Mobile sidebar ==========
  function toggleSidebar() {
    sidebar.classList.toggle('open');
    sidebarOverlay.classList.toggle('open');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  }

  // ========== Utilities ==========
  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // ========== Start ==========
  init();

})();
</script>

</div><!-- /mainContent -->

<!-- ========== Password Gate Script ========== -->
<script>
(function(){
  var HASH = '59825a70d214500a43d683dcf5bbe323c5321530dc548339984361499f29714a';
  async function sha256(str){
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
  }
  if(sessionStorage.getItem('efila_auth')==='1'){
    document.getElementById('passwordGate').style.display='none';
    document.getElementById('mainContent').style.display='';
  }
  window.checkPw = async function(){
    var input = document.getElementById('pwInput').value;
    var hash = await sha256(input);
    if(hash === HASH){
      sessionStorage.setItem('efila_auth','1');
      document.getElementById('passwordGate').style.display='none';
      document.getElementById('mainContent').style.display='';
    } else {
      document.getElementById('pwError').textContent='パスワードが正しくありません';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
    }
  };
  document.getElementById('pwInput').addEventListener('keydown',function(e){
    if(e.key==='Enter') checkPw();
  });
})();
</script>
