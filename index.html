<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>efila Policy | エフィラグループポリシー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #1a5276;
  --primary-light: #2471a3;
  --primary-dark: #0e2f44;
  --accent: #e67e22;
  --accent-light: #f39c12;
  --bg: #f5f7fa;
  --bg-sidebar: #ffffff;
  --bg-content: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --text-inverse: #ffffff;
  --border: #e0e4e8;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 8px;
  --sidebar-w: 340px;
  --header-h: 64px;
  --transition: 0.2s ease;
}

html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: "Noto Sans JP", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  overflow: hidden;
  height: 100vh;
}

/* ========== Header ========== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 1000;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: background var(--transition);
}
.menu-toggle:hover { background: #f0f0f0; }

/* Title logo image */
.header-logo-img {
  height: 60px;
  width: auto;
  max-width: 240px;
  display: block;
  object-fit: contain;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.updated-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--text-light);
  background: var(--bg);
  padding: 4px 12px;
  border-radius: 20px;
}

.updated-badge::before {
  content: "";
  display: inline-block;
  width: 6px; height: 6px;
  background: #2ecc71;
  border-radius: 50%;
}

.doc-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text);
  text-decoration: none;
  font-size: 0.8rem;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  transition: all var(--transition);
}
.doc-link:hover {
  background: var(--bg);
  border-color: var(--primary-light);
  color: var(--primary);
}
.doc-link svg { width: 14px; height: 14px; }

/* ========== Layout ========== */
.layout {
  display: flex;
  margin-top: var(--header-h);
  height: calc(100vh - var(--header-h));
}

/* ========== Sidebar ========== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100%;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.3s ease;
}

.search-box {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
  flex-shrink: 0;
}

.search-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: 12px;
  color: var(--text-light);
  pointer-events: none;
}
.search-icon svg { width: 16px; height: 16px; display: block; }

.search-input {
  width: 100%;
  padding: 10px 40px 10px 38px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-family: inherit;
  background: var(--bg);
  transition: all var(--transition);
  outline: none;
}
.search-input:focus {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(36,113,163,0.15);
}
.search-input::placeholder { color: #bdc3c7; }

.search-shortcut {
  position: absolute;
  right: 10px;
  font-size: 0.65rem;
  color: var(--text-light);
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 3px;
  pointer-events: none;
}

.search-results-count {
  font-size: 0.75rem;
  color: var(--text-light);
  margin-top: 8px;
  display: none;
}

.nav-list {
  flex: 1;
  min-height: 0;        /* ← flex子要素がコンテンツサイズ以下に縮められるよう */
  overflow-y: auto;
  padding: 8px 0;
}

.nav-list::-webkit-scrollbar { width: 5px; }
.nav-list::-webkit-scrollbar-track { background: transparent; }
.nav-list::-webkit-scrollbar-thumb { background: #d0d4d8; border-radius: 3px; }
.nav-list::-webkit-scrollbar-thumb:hover { background: #b0b4b8; }

.nav-section {
  border-bottom: 1px solid var(--border);
}

.nav-section:last-child { border-bottom: none; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  cursor: pointer;
  transition: all var(--transition);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  user-select: none;
  position: relative;
}

.nav-item:hover {
  background: #eef2f7;
}

.nav-item.active {
  background: linear-gradient(90deg, rgba(26,82,118,0.08) 0%, transparent 100%);
  color: var(--primary);
  font-weight: 600;
}

.nav-item.active::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.nav-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  height: 24px;
  font-size: 0.7rem;
  font-weight: 700;
  background: var(--bg);
  color: var(--text-light);
  border-radius: 6px;
  flex-shrink: 0;
}

.nav-item.active .nav-num {
  background: var(--primary);
  color: var(--text-inverse);
}

.nav-item-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.nav-item .expand-icon {
  font-size: 0.7rem;
  color: var(--text-light);
  transition: transform var(--transition);
  flex-shrink: 0;
}

.nav-item.expanded .expand-icon { transform: rotate(90deg); }

.sub-nav {
  display: none;
  padding: 0 0 8px 0;
  background: #fafbfc;
}

.sub-nav.open { display: block; }

.sub-nav-item {
  padding: 8px 20px 8px 56px;
  font-size: 0.82rem;
  color: var(--text-light);
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}

.sub-nav-item::before {
  content: "";
  position: absolute;
  left: 44px;
  top: 50%;
  transform: translateY(-50%);
  width: 4px;
  height: 4px;
  background: #d0d4d8;
  border-radius: 50%;
}

.sub-nav-item:hover {
  color: var(--primary);
  background: #eef2f7;
}

.sub-nav-item:hover::before {
  background: var(--primary);
}

.sub-nav-item.active {
  color: var(--primary);
  font-weight: 600;
}
.sub-nav-item.active::before {
  background: var(--accent);
}

.nav-section.search-hidden { display: none; }

/* ========== Main Content ========== */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 40px 48px;
  background: var(--bg);
}

.main::-webkit-scrollbar { width: 8px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: #d0d4d8; border-radius: 4px; }
.main::-webkit-scrollbar-thumb:hover { background: #b0b4b8; }

/* Welcome state */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  color: var(--text-light);
}

.welcome-icon {
  width: 80px;
  height: 80px;
  margin-bottom: 24px;
  opacity: 0.25;
}

.welcome h2 {
  font-size: 1.5rem;
  color: var(--text);
  margin-bottom: 8px;
  font-weight: 600;
}

.welcome p {
  font-size: 0.95rem;
  margin-bottom: 4px;
}

.welcome .shortcut-hint {
  margin-top: 16px;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.welcome .shortcut-hint kbd {
  background: #eee;
  border: 1px solid #ddd;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 0.75rem;
}

/* Content card */
.content-card {
  display: none;
  background: var(--bg-content);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 900px;
  margin: 0 auto;
}

.content-header {
  padding: 32px 40px 24px;
  border-bottom: 1px solid var(--border);
}

.content-section-num {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.content-title {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--primary-dark);
  line-height: 1.4;
}

.content-sub-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.content-sub-nav:empty { margin-top: 0; }

.content-sub-nav-item {
  font-size: 0.8rem;
  color: var(--primary-light);
  background: rgba(36,113,163,0.06);
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all var(--transition);
  border: 1px solid transparent;
}
.content-sub-nav-item:hover {
  background: rgba(36,113,163,0.12);
  border-color: rgba(36,113,163,0.2);
}

.content-body {
  padding: 32px 40px 40px;
  font-size: 0.95rem;
  line-height: 2;
}

.content-body .policy-line {
  margin-bottom: 4px;
}

.content-body .policy-doc-bullet {
  padding-left: 1em;
  margin-bottom: 2px;
  position: relative;
}

.content-body .policy-doc-bullet::before {
  content: '●';
  font-size: 0.45em;
  vertical-align: middle;
  margin-right: 0.3em;
  margin-left: -1em;
  display: inline-block;
  width: 1em;
  color: var(--text);
}

.content-body .policy-key-title {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--primary-dark);
  margin: 16px 0 20px;
  letter-spacing: 0.05em;
}

.content-body .policy-heading-1 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--primary-dark);
  margin: 32px 0 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--accent);
  display: inline-block;
}

.content-body .policy-heading-1:first-child { margin-top: 0; }

.content-body .policy-heading-2 {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--primary);
  margin: 24px 0 8px;
}

.content-body .policy-heading-3 {
  font-weight: 600;
  color: var(--text);
  margin: 16px 0 4px;
}

.content-body .policy-bullet {
  padding-left: 1em;
  margin-bottom: 2px;
  color: var(--text);
}

.content-body .policy-indent-1 { padding-left: 1.5em; }
.content-body .policy-indent-2 { padding-left: 3em; }

.content-body .policy-empty { height: 0.8em; }

.content-body .search-highlight {
  background: #ffeaa7;
  padding: 1px 3px;
  border-radius: 2px;
  font-weight: 600;
}

.content-body .placeholder-msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-light);
  text-align: center;
  gap: 12px;
}

.content-body .placeholder-msg .placeholder-icon {
  font-size: 2.5rem;
  opacity: 0.3;
}

/* Search results panel */
.search-results-panel {
  display: none;
  background: var(--bg-content);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 900px;
  margin: 0 auto;
}

.search-results-header {
  padding: 24px 40px;
  border-bottom: 1px solid var(--border);
}

.search-results-header h2 {
  font-size: 1.2rem;
  color: var(--primary-dark);
}

.search-results-header p {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 4px;
}

.search-result-item {
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
}
.search-result-item:hover { background: #fafbfc; }
.search-result-item:last-child { border-bottom: none; }

.search-result-section {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
}

.search-result-snippet {
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.7;
}

.search-result-snippet .search-highlight {
  background: #ffeaa7;
  padding: 1px 3px;
  border-radius: 2px;
  font-weight: 600;
}

.search-no-results {
  padding: 60px 40px;
  text-align: center;
  color: var(--text-light);
}

.search-no-results p:first-child {
  font-size: 2rem;
  opacity: 0.3;
  margin-bottom: 12px;
}

/* ========== Overlay (mobile) ========== */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 899;
}

/* ========== Mobile Back Button (hidden on desktop) ========== */
.mobile-back-btn {
  display: none;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 14px 16px;
  background: var(--primary);
  color: var(--text-inverse);
  border: none;
  font-size: 0.95rem;
  cursor: pointer;
  font-weight: 600;
  text-align: left;
  flex-shrink: 0;
}
.mobile-back-btn svg { width: 18px; height: 18px; }

/* ========== Responsive ========== */
@media (max-width: 900px) {
  /* デスクトップ専用要素を非表示 */
  .menu-toggle         { display: none !important; }
  .sidebar-overlay     { display: none !important; }
  .shortcut-hint       { display: none !important; }
  #searchShortcut      { display: none !important; }
  .updated-badge       { display: none; }
  .header-right .doc-link span.doc-link-text { display: none; }
  .header-logo-img     { height: 50px; max-width: 180px; }

  /* 検索結果パネルはモバイル非表示（ナビリストでフィルタリング） */
  .search-results-panel { display: none !important; }

  /* ２パネル横スライドレイアウト */
  .layout {
    overflow: hidden;
    position: relative;
  }

  /* パネル①：サイドバー = 全幅ホーム画面 */
  .sidebar {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    min-width: unset;
    transform: translateX(0);
    transition: transform 0.3s ease;
    box-shadow: none;
    z-index: 1;
  }

  /* パネル②：メインコンテンツ = 右に隠れている */
  .main {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 0 !important;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 2;
    display: flex;
    flex-direction: column;
  }

  /* コンテンツ表示時：パネルをスライド */
  body.mobile-content-open .sidebar { transform: translateX(-100%); }
  body.mobile-content-open .main    { transform: translateX(0); }

  /* サイドバーオーバーレイ表示時（FABタップ後） */
  body.mobile-sidebar-overlay .sidebar {
    transform: translateX(0) !important;
    width: 85%;
    max-width: 320px;
    z-index: 300;
    box-shadow: 4px 0 32px rgba(0,0,0,0.35);
  }
  body.mobile-sidebar-overlay .sidebar-overlay {
    display: block !important;
    z-index: 299;
  }

  /* フローティングメニューボタン（コンテンツ表示中のみ） */
  .mobile-sidebar-fab {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 16px;
    z-index: 200;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    background: var(--primary);
    color: var(--text-inverse);
    border: none;
    border-radius: 28px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.28);
    transition: background 0.2s;
  }
  .mobile-sidebar-fab svg { width: 18px; height: 18px; flex-shrink: 0; }
  .mobile-sidebar-fab:active { background: var(--primary-light); }
  body.mobile-content-open .mobile-sidebar-fab { display: flex; }
  body.mobile-sidebar-overlay .mobile-sidebar-fab { display: none; }

  /* 戻るボタン表示 */
  .mobile-back-btn { display: flex; }

  /* コンテンツカードを全画面に */
  .content-card {
    border-radius: 0;
    box-shadow: none;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .content-body { flex: 1; }
  .content-header { padding: 20px 16px 12px; }
  .content-body   { padding: 16px; font-size: 0.9rem; }
  .search-result-item { padding: 14px 16px; }
}

@media (max-width: 600px) {
  :root { --header-h: 60px; }
  .content-title { font-size: 1.2rem; }
  .header-logo-img { height: 44px; max-width: 160px; }
  .header { padding: 0 10px; }
  .header-right .doc-link { padding: 4px 10px; font-size: 0.75rem; }
  .nav-item { padding: 10px 16px; font-size: 0.9rem; }
}

/* ========== Scroll to top button ========== */
.scroll-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: var(--text-inverse);
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-lg);
  transition: all var(--transition);
  z-index: 100;
  font-size: 1.2rem;
}
.scroll-top:hover { background: var(--primary-light); transform: translateY(-2px); }
.scroll-top.visible { display: flex; }

/* ========== Print ========== */
@media print {
  .header, .sidebar, .scroll-top, .sidebar-overlay { display: none !important; }
  .layout { display: block; }
  .main { padding: 0; overflow: visible; height: auto; }
  body { overflow: visible; height: auto; }
  .content-card { box-shadow: none; border: 1px solid #ddd; }
}

/* ========== Animations ========== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.content-card.visible,
.search-results-panel.visible {
  display: block;
  animation: fadeIn 0.3s ease;
}
</style>
</head>
<body>

<!-- ========== Password Gate ========== -->
<div id="passwordGate" style="
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:linear-gradient(135deg, #0e2f44 0%, #1a5276 50%, #2471a3 100%);
  display:flex; align-items:center; justify-content:center;
  z-index:99999; font-family:'Noto Sans JP',sans-serif;
">
  <div style="
    background:#fff; border-radius:16px; padding:48px 40px; max-width:400px; width:90%;
    box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center;
  ">
    <div style="font-size:2.2rem; margin-bottom:8px;">&#128274;</div>
    <h1 style="font-size:1.3rem; color:#1a5276; margin-bottom:4px; font-weight:700;">エフィラポリシー</h1>
    <p style="font-size:0.85rem; color:#7f8c8d; margin-bottom:28px;">閲覧にはパスワードが必要です</p>
    <input id="pwInput" type="password" placeholder="パスワードを入力"
      autocomplete="off"
      style="
        width:100%; padding:14px 16px; border:2px solid #e0e4e8; border-radius:8px;
        font-size:1rem; outline:none; transition:border 0.2s; font-family:inherit;
      "
      onfocus="this.style.borderColor='#2471a3'"
      onblur="this.style.borderColor='#e0e4e8'"
    >
    <p id="pwError" style="color:#e74c3c; font-size:0.8rem; margin-top:8px; min-height:1.2em;"></p>
    <button onclick="checkPw()" style="
      width:100%; padding:14px; background:#1a5276; color:#fff; border:none;
      border-radius:8px; font-size:1rem; font-weight:700; cursor:pointer;
      transition:background 0.2s; font-family:inherit; margin-top:4px;
    " onmouseover="this.style.background='#2471a3'" onmouseout="this.style.background='#1a5276'">
      ログイン
    </button>
    <p style="font-size:0.7rem; color:#bdc3c7; margin-top:20px;">&copy; エフィラグループ</p>
  </div>
</div>
<div id="mainContent" style="display:none;">
<!-- ========== End Password Gate ========== -->

<!-- Header -->

組織運営・マネジメント方針
1．メンバーは会社に誠意をもって尽くし、会社はメンバーを守り抜く
                                 メンバーは所属している拠点や会社のために全力を尽くす姿勢を持ち、それに対して会社はそのメンバーを守る、という関係性を重視する。
                                 メンバーは仲間であり、仲間が会社に尽くす限り、会社は仲間を守るという関係性である。
※補足
「ワンフォーオール・オールフォーワン」という表現だと「個人は会社のために仕事をする」という程度の軽い印象になりすぎるため、あえて使用していない。より組織と個人が密接につながっていることを伝えたい。
                                 ここでいう「会社に尽くす、貢献する」というのは、サービス残業やプライベートを犠牲にすることを期待するものではなく、「組織に貢献しよう、役に立とう」という姿勢を指す。
                                 「自分の役割をこなしていればそれでいい」「都合よく稼げればそれでいい」「パートナーに迷惑をかけなければ会社は関係ない」という個人の集合体では、自己中心的な組織になり、簡単に崩壊する。
                                 「自分のために会社を都合よく利用しよう」という人たちが集まる組織にはしない。
                                 会社や組織としては、メンバーは仲間であり、メンバーが正しく会社に貢献をし続けようとする限り、切り捨てることはしない。（能力面でのチェンジはあったとしても、排除はしない）
                                 今のポジションで結果が出ないのであれば、力を発揮できそうな別の場所を提案するなど、簡単に諦めることなく「どうしたらメンバーが輝けるか」を考える。
                                 例えばメンバーが業務上のトラブルに巻き込まれた場合は、当然会社も一緒に解決に向けて動き、発生した経済的損失は会社が負担する。
                                 パートナーとのトラブルに巻き込まれたとしても、そのメンバーがパートナーに対して不誠実な対応をしていないのであれば、会社はパートナーに対して毅然とした態度をとり、メンバーを守る。
                                 ただし、誤解しやすいが「守る」とは上長が部下のルール違反や不正、ミスを隠すことを指すのではない。
例：拠点で起こった虐待案件を拠点長が本部に報告しない、という意味での「守る」ではない。
                                 「上長とメンバーの関係性」での守るではなく、「会社とメンバーの関係性」において会社がメンバーを守るのである。
                                 会社からメンバーを守るという発想は誤りである。
                                 一方で、会社を裏切ったり、会社に害を与える行為をした者に対しては、放置せず毅然とした対応を行う。


2．フォアザエフィラ
                                    「自分だけがよければそれでいい」ではなく、自分の行動や目標達成の結果が会社の結果に結びついていなければ意味がないという考え方を正しいものとする。
                                    自分の役割を差し置いて会社を気にすることを推奨するわけではない。まずは自分の役割を全うすることを求めるが、その先に会社の成果につながっている必要がある。
例：
サッカーを例にとると、それぞれキーパー、フォワードなど役割がある。
                                    キーパーが自分の仕事を放ったらかしにして点を取りに攻めに行くことは許されない。
                                    同時に、自分が0点に抑えたとしてもチームが勝たないと意味がない。
                                    チームの勝利の方が、個人の活躍よりも重要。
→ それと同様に、私たちは「個人はチームのために役割を果たし、チームとして結果を出すこと」を重視する。


3．シンプルマネジメントを土台にする
 ①シンプルマネジメントとは
                                    「感情」や「曖昧な人間関係」に左右されないようにしたマネジメント。感情的に寄り添ったりすることを極力排したマネジメントのため、シンプルマネジメントと呼称している。これをマネジメントの基本とする。
                                    以下のような特徴がある。
                                    上司と部下の責任と権限と役割を明確にする
                                    好き嫌いではなく明確なルールに基づく
                                    部下と友達のように接しない
                                    階層を超えたコミュニケーションを控える
                                    公平に接する
                                    怒りの感情を出さない
                                    個人が会社に合わせる
                                    個人の成長に焦点をあてる
                                    結果で評価
                                    責任の違いにより見える景色が異なる
                                    組織図を重視する
                                    上記特徴だと厳しい印象を受けるため、これらの逆の特徴を持つマネジメントが一見よさそうだが、結局全員が納得する決定や判断はできないため、時間がかかり何も進まないという現象が起きてしまう。
                                    当社では会社はミッション実現のために存在していて、その過程を通してメンバー個人の自己実現や幸福につながっていくものだと考えている。
                                    責任あるものは結果を出すことに集中する必要がある。結果を出す過程の中でしかメンバーの長期的な幸福の実現はできないものと認識し、結果を出せるマネジメントを私たちとしては選択する。
                                    結果を出せるマネジメントがこのシンプルマネジメントとする。
 
 ②マイルドマネジメントとは
                                    管理を“優しくする”という意味ではなく、人の感情・価値観を含めてマネジメントする考え方。
                                    特徴例：コミュニケーションを重視、承認や感謝のフィードバックを多くする。


 ③本部とマネジャーはシンプルマネジメント
                                    本部メンバーと事業責任者に対するマネジメントは、生産性や結果が求められる役割であるため、シンプルマネジメントを基本とする。


 ④現場はシンプル＋マイルドマネジメント
                                    ここでいう現場とは対人援助を行うメンバーであり、数値や結果目標で評価されないメンバーを指す。
                                    現場メンバーは生産性や結果よりも、お客様への感情的に寄り添った対応が必要なため、シンプルマネジメントに加えて、マイルドマネジメントの要素も入れたマネジメントをとる。
                                    全てマイルドマネジメントではなく、土台にシンプルマネジメントを置いたうえで、マイルドマネジメントの要素を入れていく。


4．現場は拠点長を中心に組織運営を考える
                                    責任者やブロック長など大事なポジションもあるが、拠点長を中心にマネジメントや評価の仕組みを考える。
                                    メンバーからすると「拠点＝会社」であり、拠点や拠点長を通して会社を見ている。
                                    拠点が自分が存在する世界であり、それが会社である。
→ 拠点長が会社の方針と異なる発信をしていたら、メンバーは異なる理解をしてしまう。拠点長が拠点の風土を作り、メンバーの成長のカギを握る。
                                    役に立ちたい感における拠点長によるマネジメント・リーダーシップの影響は8割程度ある。


5．ボトムダウン
                                    組織運営はメンバーからの情報や意見を聞いたうえで、その組織の責任者が決定をする流れを基本にする。
                                    （メンバーからの上がってくる情報を元に、責任者が決定をするという流れからボトムダウンと呼ぶこととする）
参考：
                                    ボトムアップ：部下の意見を中心に合議などで決定していく完全なボトムアップのマネジメントは、誰も責任を取らない無責任な決定になる、全員に配慮した中途半端な決定になる、などの弊害が起こりやすい。
                                    トップダウン：部下の意見を聞かず、組織の責任者が独断で指示をしていくトップダウンのマネジメントは、組織の実情にそぐわない独りよがりな決定になる可能性が高い。


注意：ボトムダウンの目的は最善の意思決定をすることにあり、「役に立ちたい感」をあげることではない。
                                    ボトムダウンの目的は最善の意思決定をすることにあり、そのために部下からの情報収集を行うことがボトムダウンの本質である。これを実行するとどう感じるか、どう思うのか、現場目線で起きていること、などの上長側がもっていない事実情報や思いもしなかったアイデアを集めること。それを組織の意思決定に活かし、精度の高い判断につなげていく。
                                    「役に立ちたい感」をあげるためではない。 「自分も決定に関わっている」と感じてもらう（参画意識を持たせる）ことを目的にすると、「部下が納得する案」や「部下が喜ぶ案」を採用しようとする、部下の意見を順番に採用してあげようとする、などのバイアスがかかる。それだと本来の組織にとっての最善の判断とずれることがある。
                                    折衷案をとる必要もなく、部下からの意見や情報収集を行った上で、上がってきたものと全く異なる意思決定をすることもあり得る。
                                    役に立ちたい感を目的にしないが、結果的に役に立ちたい感があがる、というのが正しい流れ。




6．階層ごとの行動・思考の基準（Do / How / What）
                                    階層によって、求められる「思考の深さ」と「行動基準」は異なる。
                                    レギュラーメンバー（Doを重視）
 「何をするか」や「どうやるか」を独自に考える前に、まずは 与えられた業務やルールを完璧に遂行（Do）する責任 を持つ。
                                    拠点長クラス（Do ＋ How To Do） 
指示や決められたことを完璧に行う（Do）のは大前提として、それに加えて、与えられた目標に対して 「どうやって達成するか（How）」の仕組みややり方を自ら考える必要がある。
                                    事業責任者クラス（Do ＋ How ＋ What To Do）
 実行（Do）や達成方法（How）を考え抜くことに加えて、既存のやり方や目標に留まらず、 「事業を発展させるために、そもそも何をするべきか（What）」という事業戦略やビジョンそのものをゼロから描き、決断する責任 を持つ。






組織運営・マネジメント方針の補足


1．ルール
背景
                                    国家が法律に基づいて運営がされているように、エフィラではエフィラのルールで運営を行う。
                                    何となくの慣習やその時の感覚でものごとを判断すると、人によって「やっていいこと」と「悪いこと」が異なり、迷いが生まれる。
                                    また、上長によって判断が違ってしまうため、拠点ごとに異なる運営になってしまう。
                                    ルールがあるというのは堅苦しくて厳しい印象を受けることもあると思うが、実際はその方が働きやすいものである。
例：
信号は「赤は止まれ、青は進んでいい」と決まっているが、そのルールがなければ、交差点に進入するたびに一度止まり状況を考えないといけない。
                                    エフィラという組織にいる以上、ルールに対しては理由もなく従わなくてはいけない。
日本においては「道路は左側通行」「飲酒運転は禁止」「麻薬は禁止」である。そこに理由はない。
国によっては合法なところもあるが、「日本はなぜダメか」と言われても「そう決まっているから」としか言えない。
少しの麻薬もダメなものはだめであり、「自分は効かないから大丈夫」という理屈は通らないのと同様である。
特例
                                       特例は出さないのを基本とする。
特例を出すことの弊害は以下の通り。
                                       1. 最初から特例を前提に行動をするようになりルールが形骸化する。
                                       2. 「ちゃんとやろう」とするのではなく、「どうやって特例をもらえるか」という視点になり行動の方向性が変わる。
                                       3. ルールをちゃんと守っている人が損することになり不公平。
                                       この人は文句を言うから特例を出してあげる、など声の大きさで対応が変わることは「ごね得」を許すことになり、絶対にあってはならない。
特例発生時
                                       ルールが実情に合わないなどの問題が発生したり、考慮しないといけないことがあった場合は、ルールを破ることを認めるのではなく、ルールに特例規定を設けるなどして、全員に対して公明正大な組織運営を目指す。
                                       特例措置は、やむを得ない事情がある場合の「セーフティネット（救済措置）」である。 あくまで「マイナスの状態をゼロに戻すためのもの」であり、ルールを守っている人よりも有利になったり、本人が得をする（プラスになる）ような特例にはしない。
柔軟に改定
                                       ルールは守らないといけないものだが、組織運営上、よりよいルールに常に改定することは必要。
                                       メンバーからの意見をもとに、必要であれば変えていく柔軟な運用をする。


2．不正行為やルール違反
                                       不正は会社やメンバーに対する裏切り行為である。
                                       不正行為やルール違反に対しては見つけ次第、厳しく対応する。決して許すことはない。見て見ぬ振りもしない。正直者や真面目にやっている者が馬鹿を見る状況にはさせないようにする。
                                       結果を出していたら不正しても多少許される状況も作らせない。
                                       特に役職が高い者ほど、不正行為やルール違反を行った場合の処分の度合いを高くする。


3．人を憎まず、仕組みとルールを憎む
                                       ミスが起きたらその原因は個人の能力不足のせいにせず、まずは仕組みやルールの不足にあると考える。
                                       個人のせいにしていたら、同じ人によるミスは再発しなくなっても、また同じ問題が別で起きる可能性が残る。


4．公平
                                       特定の誰かを何となく評価することも、優遇することもしない。
                                       制度やルールに基づいて、公平な運営を目指す。
                                       制度やルール自体も公平を目指す。完璧な公平の実現は難しいが目指していく。
                                       ただし会社にとって有益な行動や事象に対して優遇することはある。
参考：公平と平等の違い
「平等」・・・「全員に同じもの（条件）を与えること」で画一的・均等な扱いを指す。「公平」・・・「個々の状況や必要性を考慮し、適切な支援や調整を行うこと」。
例：通勤手当を全員一律5000円するのが平等、住んでいる場所に合わせて支給額が変わるのが公平。


5．責任範囲と役割を明確にする
                                       この業務は誰が実施するのか、結果は誰の責任になるのか、この業務はどこからどこまでなのかなどを明確にする。
                                       個人個人の役割と責任範囲は「なんとなく」ではなく、できるだけ明確にする。
                                       明確にして、明記することが重要である。
                                       それが決まっていないと、何をやるかがあいまいになったり、無責任になったりといった弊害が生まれる。


6．意見を言える環境
                                       自分の意見を伝えた結果、その内容がどうだったか次第で罰を受けることがないようにする。
                                       気づかない情報が上がってくることもあるため、意見や情報がたくさんあがってくることはよいことだと捉える。
                                       言い方次第で評価に影響することはあるが、内容や意見を伝えた事実のみで評価を下げることはしない。


7．無駄なストレス・慣習の徹底排除
                                       上長の顔色を見て対応をしないといけないようなことがないようにする。
                                       文書で決まっていない慣習のようなものは徹底してなくしていくようにする。
具体例：
                                       上長との関係を作るための強制的な飲み会
                                       バレンタインやお歳暮などの慣習
→ メンバーからするとストレスの要因になるため禁止にする。
                                       パワハラ・セクハラにつながりそうな行為は、実際になるかならないかに関わらず基本はなくす方向にする。
                                       「そういうつもりではなかった」とやった側は思っても、受け取り手は異なる認識をすることがある。そういう疑いがある言動は廃止していく。


8．仕組みの改善を積み重ねる
                                       仕組みがあることで得られるメリット：
                                       誰でも同じ品質でできる
                                       生産性が上がる
                                       人が変わっても同じ結果が生まれる
                                       教育に頼らなくてよい
                                       仕組みによって高い成果が保証される。
                                       仕組みとは、大掛かりなものだけではなく、日々のオペレーションの「決まりごとレベル」でも十分である。
                                       この仕組みの改善を積み重ねることで、過去の失敗や経験を踏まえた最適な状態を誰でも実施することが可能になる。
                                       担当する人が変わっても一定の水準を維持でき、会社の資産として積み上がっていく。


9．性弱説を前提にする
                                       「人間は本来、善でも悪でもなく、意志が弱く流されやすい存在である」と考える説に基づく。
                                       教育や仕組み・ルールなどがなければ、楽な方、簡単な方、都合のいい方に流される。環境や教育次第で大きく左右されるという考え方。
                                       私たちはこの考え方に基づいて組織を考える。
※補足
                                       性善説＝人間は本来善である
                                       性悪説＝人間は本来利己的・欲望的である
                                       性弱説＝人間は本来「弱い」存在である
→ 私たちは性弱説に基づいて、ルール・仕組み・制度を作る。


10．自助 → 互助
                                       福祉でよく使われる言葉だが、私たちの組織運営にも当てはまる。
自助
                                       自分の問題や困難に対して、自ら工夫や努力をして解決しようとすること。
                                       他者や制度に頼る前に、自分でできる範囲のことをまず行う姿勢。
互助
                                       身近なつながりの中で互いに助け合うこと。
                                       自分ひとりでは解決できない問題を、周囲の人と支え合うことで補うこと。
ポイント
                                       自助と互助の順番が大事。
                                       自分の役割をこなすことができていないのに、周りを助けることはできない。
                                       「フォアザエフィラ」の方針でも、自分の役割をまずこなし（自助）、そのうえでチームを助ける（互助）という流れが重要。
                                       自分の役割を放ったらかしにして他者を助けることはできない。そうではないと、自分の守備範囲がおろそかになり、結果的に組織が機能しなくなる。
                                       自立した個人同士だから助け合える。


11．ミスよりも隠ぺいが×
                                       人命に関わるミスはあってはならないのだが、それに満たないミスは発生することはある。
                                       ミスを絶対に許さないとしてしまうと何もできなくなってしまうので、ミスが発生した際は仕組みやルールの見直しを含めて検討し、二度起きない仕組みに変えていく。
                                       ミスは報告があればそれに対する責任の追及は軽微なものとする。一方で隠ぺいがあった場合は、相応の処分とする。
                                       ミスで責任追及が大きい場合、特に隠ぺいの体質が生まれてしまうため、基本はそのような仕組みは作らない。


12．会社に牙をむいた人には徹底対応で容赦しない
                                       会社に反旗を翻した者、批判する者、裏切った者はエフィラのメンバーではない。
                                       メンバー全員、一心同体ではあるが、体の一部だとしてもがん細胞のようなもので、早期に切除しないと他の部位にも転移してしまう。
                                       会社に対して敵意を持つ者は会社から排斥を即座に行うと同時に、メンバー全員で作り上げている会社を守るために強い姿勢で臨み、全力で戦う。そこに一切に妥協をしない。


Ⅴ．採用
1．人柄を重視する
                                       人柄が合わない人は採用しない。採用したい人を採用することよりも、採用すべきではない人を採用しないことが重要。
                                       経験よりも、個人の持っている人間性や性格を重視して採用する。経験者がだめなわけではないが、人柄に重きを置く。
                                       経験者でないと採用できないポジションもあるが、その場合でも経験だけで判断せず、人柄が合致するかを確認する。
                                       人柄が合わない人を採用してしまうと教育では対応できず、組織が崩壊する恐れがある。
                                       多様性（ダイバーシティ）については、性別・国籍・年齢・働き方などは多様性を認める一方で、価値観がバラバラになることは避ける。価値観の一致は採用後の教育・育成である程度可能だが、人柄の不一致は後から修正が難しい。


2．採用しない人
以下に該当する人は採用しない。
                                       愚痴が多い人
                                       嘘をつく人
                                       自分がいつも正しいと思っている人
                                       偉そうな人
                                       怒りっぽい人
                                       自己中心的な人
                                       面接に「来てあげている」という態度を取る人
                                       清潔感がない人
                                       ネガティブな人
                                       攻撃的な人
                                       約束を守らない人


３．迷ったら採用し、有期契約で判断
                                       人柄として私たちに合っているか・合っていないかは、最終的には一緒に働いてみないとわからないことが多い。
                                       メンバーである以上、価値観を合わせてチームとしてずっとやっていくことになるが、面接だけでそれを判断するのは困難。
                                       仕事を一緒にする中で、価値観を共有し合わせられることもある。教育で価値観を合わせていくという考えももちろん必要。
                                       「わからない」ことで不採用にしてしまうと、本来合っていた方を不採用にしてしまう可能性がある。
 最初から絞りすぎると、機会損失が生まれやすい。
                                       そもそも、合っていると思った人でも、思っていたのと違っていたというミスマッチは起こり得る。
  結局は、一緒に働いてみないとわからないことが多い。
                                       採用してみないとわからないから、有期契約で採用してみて、実際に働く中で判断する。
                                       ただし本部メンバーの場合は、入社体験を通して判断ができるため、迷ったら採用ではなく、迷ったら見送りとする。


 ▽ 具体例
例えば、以下のケースを考えると「採用していた方がいい」ということになる。
応募状況
	内訳
	結果
	応募者10名
	問題ない方＝1名、判断に迷う方＝2名（うち1名は最終的に問題あり）
	3名とも採用した場合：2名が更新、1名は有期満了
	応募者10名
	問題ない1名だけ採用した場合
	 1名が更新のみ
	________________
 
４．喫煙者は採用しない
                                          「生ききる」という理念を掲げており、またパートナーの健康促進を支援する会社であることを考えると、喫煙習慣がある人は採用しない。
                                          喫煙は個人の自由ではあるが、私たちのメンバーとしてはふさわしくない。
                                          ただし、もともと喫煙習慣がある人でも、入社のタイミングで喫煙をやめるのであれば問題はない。
                                          休憩時間だろうと自宅だろうと、自分の健康の維持に努められない人はメンバーにはならない。




5．全メンバー採用を優先業務とする
                                          メンバーが増えないと「誰ひとり取り残さない街をつくる」というビジョンの実現は難しい。
                                          本部メンバー、現場レギュラーメンバー含めて、採用は優先業務であり、採用部の所属ではないにしても、全員で仲間を増やすということはしていく。
                                          サッカーではキーパーでも、点を決められる状況なら本来の役割と違っていても狙いにいく、点を取ることに全員が集中をしている。


Ⅵ．退職
1．いい離職と悪い離職
                                          すべての離職が悪いわけではなく、適正な新陳代謝も必要である。従って、離職ゼロが理想ではない。
                                          いい離職：ルール違反を続ける人、不正行為をする人、価値観を合わせようとしない人、風土を乱す人が辞めていくこと。（価値観を合わせようとしない人に対しては、上長は合わせてもらう努力は必要）。
                                          悪い離職：価値観が合っている人が、さらなる成長を求めて辞めていくこと、会社や環境に未来がないと思って辞めていくこと。
                                          その他のケースとして、「貢献できていない人が評価が低く辞めていく」場合がある。これは本人だけでなく、上長が成長を支援できなかったことも要因であり、組織としても改善の余地がある。


2．メンバーとして適していない人
以下のような人は、私たちのメンバーとしてふさわしくない。チームの進行を妨げ、組織に悪影響を与えるため、可及的速やかな退職を求める。
①不適合となる具体例
                                          エフィラウェイに反する行動をとり続ける人（価値観を合わせようとしない人）
  多様性はあってもよいが、価値観は共通でなければならない。
                                          ルール違反をし、守ろうとしない人
                                          不正行為をする人
                                          自分さえよければそれでいいという「フォア・ザ・エフィラ」がない人
                                          win-loseの概念の人
  周りを傷つけたり、論破しようとしたりする。結果として風土を乱す。
                                          ネガティブインフルエンサー
  言動や態度によって、周囲の意欲・雰囲気・評価などに悪影響を及ぼす影響力を持つ人。
 
② 対応の基本姿勢
                                             メンバーは全員が一心同体ではあるが、
 上記のような方々は他に悪影響を及ぼし、組織を壊していく“がん細胞”のような存在ととらえ、毅然と対応する必要がある。
                                             放っておくと、他のメンバーにも悪影響が及ぶ。
 早期対応が組織を守る。


③ 退職のとらえ方
                                                このような方々の退職は、
 一見「退職」という観点ではネガティブに感じるかもしれないが、
 合っていないなら双方にとって時間がもったいない。
                                                さらに、私たちが引き止めることで、
 本人が本来出会うはずだった新しい会社との出会いを奪ってしまうことにもなる。
                                                したがって、このような退職は「一期一会」と前向きにとらえる。
 お互いによりよい未来へ進むための自然な選択と考える。


3．向上心がない人・成長を望まない人は許容する
                                                   決められた役割をきちんとこなしている限り、成長を望まない人や向上心がない人もメンバーとしては歓迎する。
                                                   他社の中には「常に成長する人だけを残す」方針の組織もあるが、私たちは「役割を全うできている」こと自体に価値を認める。
                                                   環境の変化で考えが変わる可能性もあるため、パートナーや他のメンバーに害を与えない限りは問題ないとする。
                                                   ただし、管理職については例外。部下にとって「成長を望まない上長」であることは不幸であり、離職の原因となる。そのため管理職は基本的に向上心のある人材を登用する。


４．有期契約
① 有期契約とは
                                                   面接のみでは見極められない人に対して、有期契約にすることで入社後の勤務姿勢による判断が可能になる。
                                                   有期契約中の社員は「アソシエイト社員」と呼称する。
 
② 満了の基準
有期契約満了の判断は、以下の２つの観点で行う。
    【１】人柄が合わない場合
以下に該当する場合は、迷うことなく満了とする。
                                                   価値観を合わせようとしない
 （ルール・エフィラウェイ・マニュアルに従わない）
                                                   シフト通りに勤務できない
                                                   指示に従わない
                                                   組織風土を乱す（上司や同僚ともめる 等）
※上記のような行動があると、組織力が削がれるため、即満了判断とする。
 
   【２】能力が基準に満たない場合
                                                      キャリアパスの「1」にあるような最低ラインの仕事ができない場合は、そもそも仕事として成立しない。
                                                      あまりに職務遂行ができない場合は、周囲にしわ寄せがいってしまう。
                                                      例：調理職として入ったのに、調理がまったくできず、今後もできる気配がない 等。
                                                      役職や職種ごとの最低ラインをクリアできているかで判断する。
                                                      現時点で基準を満たしていなくても、今後満たす見込みがあるかが最終判断ライン。
※この条件で満了とした方であっても、 人柄面がクリアしている場合は、可能な限り別事業で活かせる場を探し、提案する。
※有期期間中は単なる見極めではなくた、当然、可能な限り育成をして戦力にしようとする必要はある。
 
5．「去る者は追う」
                                                      価値観が合っており、所属していてほしいメンバーが退職しそうな場合は、
 放置せず、全力で引き止める。
                                                      上長だけでなく、組織全体で対応する。
その場合は一個飛ばしで面談することも可。
                                                      退職理由が家庭の都合など、やむを得ない事情である場合でも、
 何かできないかを確認し、可能な限り対応を検討する。
                                                      個人に合わせて特別対応をするのは望ましくないが、
 制度変更によって全員に適用できる形にすれば公平性が保たれる。
  今回のケースをきっかけに、他のメンバーにも適用できる仕組みに昇華させることを理想とする。


6．去り方に対する価値観
                                                         引継ぎもしっかり行い、残ったメンバーや会社に迷惑が掛からないように円満に退職するのが本来あるべき姿。
                                                         そういったメンバーは一度会社を外れても再度戻ってきていただきたいメンバーだと考える。
                                                         裏切り・誹謗中傷・引き抜きなどを行いながら退職をする者は、明確に敵意があると判断し相応の対応をする。立つ鳥跡を濁さずであるべき。


Ⅶ．勤務体制
1．多様な働き方への対応
                                                         パートナーのあらゆるニーズに応えるためには、長時間の営業が必要となる。そのためメンバー側には、可能な限り多様な働き方を用意し、一人ひとりの負担を軽減することを目指す。
                                                         休みが少なくても収入を増やしたい人、平日に休みが欲しい人、土日祝休みを希望する人など、ライフステージや価値観に応じて働き方を柔軟に選べるようにする。
                                                         具体例としては、「土日休みの社員」と「土日必ず出勤の社員」を組み合わせて週7日営業を実現するなどの工夫が考えられる。
                                                         1つの事業内で実現できなくても、別事業に移籍することで希望に沿った働き方を実現できるようにする。
                                                         報酬と休日の両立には限界があるため、「バランス型」「休日多め」「給与多め」など複数の雇用条件を設け、多様性に対応する。
                                                         基本方針は「長期的に無理なく続けられる働き方」を実現することである。
 
2. 育児中でも続けられるように
                                                         育児中でも働き続けられる体制については、特に重視する。
                                                         もし仕組み上、育児との両立が難しい部分がある場合は、制度や仕組みの改善を検討し、続けられるようにする。
                                                         メンバー全員で育児をしている人を歓迎し、支え合う風土をつくる。
                                                         育児をしている人が後ろめたさを感じることがない職場にする。
                                                         世の中に子どもが増えることは絶対的に良いことであり、全員がそのことを歓迎し、支援する文化を築いていく。決してネガティブな感情を周りが持たないようにする。
 
3．テレワーク（リモートワーク）
                                                         多様な働き方を推奨はしているが、基本的にはテレワークは認めず、出社を原則とする。
                                                         理由は以下の通り。
 ① コミュニケーション不足によるチームの一体感低下
 ② 偶発的なアイデアや創造的な議論が生まれにくい
 ③ 所属意識が希薄になる
 ④ プライベートと仕事の境界が曖昧になり生産性が下がる
                                                         ただし、やむを得ない事情がある場合や、テレワークで対応可能な業務に限り、臨時的・限定的に許可する。
                                                         例としては、子育て中、家庭の急用、病気療養などが挙げられる。
 
4．副業
                                                            副業にはデメリットもあるが、メンバーの成長や時代背景を考慮し、一定の条件下で認める。
                                                            特に経済的な事情から副業を希望するケースは増えており、柔軟に対応する。
                                                            ただし、以下の副業は禁止とする。
 ① 同業での副業：会社の機密情報やパートナーの情報が流出するリスクがある。
 ② 当社の勤務シフトに影響する副業：副業の都合で特定曜日の休みを固定的に要求するなど、他メンバーにしわ寄せが発生するケース。
                                                            また、ブロック長以上の管理職や責任あるポジションの副業は望ましくないと考える。理由は以下の通り。
 ① 利益相反：副業先と会社の利益が相反する場合、会社への忠誠心や判断に影響が出る可能性がある。
 ② パフォーマンス低下：副業による過労や睡眠不足がエフィラでの仕事に悪影響を及ぼす。
 ③ 組織内の信頼関係の低下：副業に力を注ぐ管理職は、全力でエフィラに向き合う管理職と比べ信頼を得にくい。責任ある立場の者は、当社に全力を注ぐ姿勢が重要である。


Ⅷ．福利厚生
基本方針
福利厚生はあればあるだけいいものだが、すべての面において完璧にするのは難しい。そのため、以下の要素を重視して進める。
                                                               1. 持続性
  会社の成長とともに拡充させていくが、無理のない制度設計とする。
                                                               2. 理念適合
  エフィラの「生ききる」「誰ひとり取り残さない街をつくる」に沿う福利厚生を重視する。
 （例：成長支援、生活支援、地域とのつながり支援など）


Ⅸ．給与
基本的な考え方
                                                                  給与は 勤務した対価として支払われるもの である。
                                                                  勤務した時間に基づき支払われるのが基本ではあるが、そこにいるだけで支給が保証されるようなものではない。貢献することで対価が発生する と考える。
                                                                  ただ単にその場にいるだけであれば会社として何のメリットもなく、貢献をしてもらう対価として給与が発生しているという構造であるから、会社は存続することができる。
決定要素
                                                                  給与の総額は諸々の手当の総額であるが、主には市場価値と貢献度によって決まるべきもの。
                                                                  市場価値 … 今やっている業務内容や職種を新しく採用した人で代替することになったら、どのくらいの給与が必要になるかという視点。
                                                                  貢献度 … 会社にどれだけ経済的メリットをもたらしたかという観点。主に成果給で支給される。
                                                                  市場価値と貢献度が上がれば給与があがる、というのが基本的な考え方。
在籍期間と給与の関係
                                                                  会社にいるだけで給与が無制限に上がっていくことはない。
                                                                  長く在籍していることによって成長し、発揮できる能力が上がるから給与が上がる というのが正しい構造。
                                                                  ただし、長期的に未来を描け、それにより長くエフィラにいてもらいたいため、在籍していることによるメリットもあるようにはする。
手当と職種の違い
                                                                  資格手当や業務手当などは、事業ごとに必要なものを評価して設定するため、額が異なることがある。
                                                                  事業が変われば手当も変わる。
                                                                  例：弁護士資格は難関資格であり社会的には評価されるが、介護現場ではほとんど役に立たないため、評価される手当は作らない。
属人的手当
                                                                  住宅手当や家族手当、子供手当といった 「属人的な手当」は原則として設けない 。
                                                                  家族の形やライフスタイルが多様化している中、 特定の個人の事情に依存する手当は公平性に欠く。
                                                                  ただし、TKや市場との比較により、採用市場において必要な場合は本意ではないが設定することもある。
ローテと給与
                                                                  ローテ（異動のこと）をして事業や業務内容が変われば、その職種にあった給与になるのが基本。
                                                                  猶予期間は多少設けることもあるが、事業に合わせた設定に変わる。
外部比較
                                                                  年収ベースで考えたときに、同地域・同業種・同職種と比較して上位20％程度に入るような給与設定 を常に維持するようにする。


Ⅹ．評価
基本方針：「功には禄を、徳には地位を」
                                                                  西郷隆盛の名言「功には禄を、徳には地位を」を基本とする。
                                                                  成果を上げた人には報酬（成果給・等級昇格）で報いる。
                                                                  徳のある人には責任ある地位（役職昇格）を与える。
                                                                  結果を出したメンバーには給与で評価し、エフィラウェイやフォアザエフィラの精神を体現する模範的メンバーには組織上の階層を上げる。
公平性の追求
                                                                  公平であるかどうかの判断は難しく、100％の公平な評価は不可能。
                                                                  しかし 公平の追求は常に行う。


成果による格差の容認
                                                                  「功には禄を」の原則に基づき、結果が求められる層においては、給与額の格差が拡大することを容認する。
                                                                  全員が平等に少しずつ上がるのではなく、 圧倒的な結果を出した者は同じ仕事をしている他のメンバーよりも多くの対価を得られる設計 とする。これを公平だと考える。
評価の基本は「結果」
                                                                  評価は可能な限り 結果で行う。
                                                                  現場メンバーのように数値化が難しい場合もあるが、できるポジションは必ず結果で評価する。
                                                                  結果とは：収入や原資だけでなく、営業に○件行ったなどの数値や「やった／やっていない」といった明確な判定ができるもの。
評価の基準
                                                                  会社や上長が求める結果 に対してどうだったか、で評価する。
                                                                  自分自身が独自に設定した結果に対してではなく、上長や会社が設定した結果に到達したかどうか で判断される。
                                                                  例：新規パートナーが多い、収入が高いなどをアピールしても、会社がそれを求めていなければ評価には値しない。
結果で評価する理由
                                                                  1. 公平さにつながる
                                                                  頑張りを公平に評価するには「結果」で測るのが最も公平。
                                                                  頑張った人が損をしない仕組みが「結果での評価」。
                                                                  2. 個人の成長につながる
                                                                  プロセスで評価すると「上長へのアピール」や「長時間労働」などに偏りやすく、成長を阻害する。
                                                                  何をどうしたら評価されるかが明確なら、努力の方向が定まり、成長につながる。
                                                                  3. 組織は結果で存続する
                                                                  会社はパートナーに選ばれる結果があってこそ存続できる。
                                                                  よって組織を構成するメンバーも、結果で評価される必要がある。
曖昧さの排除
                                                                  人によって認識が異なるため、全員が納得する評価は不可能。
                                                                  しかし 曖昧さを排除し、明確さによって納得感を高める。
                                                                  上長や会社が何を求めているかを明確にし、それに応えた結果で評価する。
                                                                  ただし、曖昧さを言い訳にして責任を回避することは許されない。
補足①：拠点や事業の「黒字／赤字」について
                                                                  評価項目に含まれなければ、黒字だから評価されるわけではなく、赤字だから評価が下がるわけでもない。
                                                                  拠点や事業の状況は異なり、個人のコントロール外の要素も多い。
                                                                  例：新規拠点は最初は赤字、需要が少ない地域では赤字から抜け出せない。
                                                                  単純な比較はできないため、目標や評価項目に対する達成度合いで評価が決まる。
                                                                  黒字／赤字で判断すると、立て直しに挑む責任者が損をし、恵まれた環境にいるメンバーが得をするなど不公平が生まれる。
                                                                  責任者にとって重要なのは、機会損失をなくし、伸びしろを埋めきったかどうかである。


補足②：ルール違反と目標未達成の違い
                                                                  ルール違反者 … チームにいてはいけない存在。違反を続ければ退出させる。

                                                                                             フレーミング効果

                                                                                             損失回避バイアス

用語の基本方針


「言葉」選びに神経を使う
                                                                                                                                                                              言葉がもともと持つ印象によって、事実がどうであろうが引っ張られてしまうもの。（売上や利益という言葉を使うと営利が一番の目的でポリシーに反するように感じるなど） 
                                                                                                                                                                              仕事で使う言葉は意味が伝わりにくかったり、誤解を招くようであれば造語を作り定義をする。
                                                                                                                                                                              言葉は良くも悪くも、社内の文化を作るため使う言葉は慎重に選ぶ。


Ⅰ．人事・マネジメント関連
1．成長
                                                                                                                                                                              「できなかったことができるようになること。またはできていたことがよりできるようになること。」を指す。
                                                                                                                                                                              目標に向かって取り組むことで得られるもの。
                                                                                                                                                                              成長は会社にとっても本人にとっても、誰にとってもメリットがあるもので、上長が導いていくべきもの。
                                                                                                                                                                              成長をすると、見える景色が変わり、より成長をしたくなる。それが個人の幸福につながる。


2．欠点
                                                                                                                                                                              ビジネスでは長所に目を向けるべき、欠点はあきらめるというような表現があるがそうではないと考える。
                                                                                                                                                                              組織においてはそこが重大な弱点にならない最低ラインまでは短所は克服しないといけない。
                                                                                                                                                                              欠点を克服したうえで、長所を伸ばすという考え方。欠点に目を向けないという考え方は正しくない。

                                                                                                                                                                              一芸に秀でているにしても組織としての最低ラインの役割がこなせない限り、チームとして機能しない。
                                                                                                                                                                              欠点の穴をふさぐことができれば、長所もより機能する。
具体例
                                                                                                                                                                              自分はタブレットへの記録の入力が苦手だからやれないとなると、誰かがそれをしないといけないか、または記録をしないことになり、それが品質の低下を招くことになる。


3．信頼

                                                                                                                                                                              飲み会やプライベートの話などを通して構築される関係は補助になったとしても、真の信頼関係は作れない。


4．ルールとマニュアル
                                                                                                                                                                              ルール：社内において、守らないといけないものであり、異論の余地がないもの。ルールに不具合があればルール自体を変更することで、別の対応が可能になる。完全結果で記載されているもので、解釈の余地は作らない。
                                                                                                                                                                              マニュアル：指針であり、ルールほど明確に定められていないもの。大きな方針であり、局面によっては異なる対応が必要になることもあるし、内容自体に解釈の余地があることもある。
                                                                                                                                                                              すべての状況をルールで規定することは難しく、状況による場合もあるため、その場合はマニュアルという形で解釈の余地を残す。また、状況による判断もあるため、マニュアルに反した行動一つをとって間違っているという判断はできない。


5．責任
                                                                                                                                                                              「その範囲において結果を自分で引き受ける」ことをいう。
                                                                                                                                                                              責任があるとは、結果を引き受けることであり、最終的には自分が完了までもっていかないといけない状態だということ。
                                                                                                                                                                              したがって、できなかった場合に責任を取るとは、辞職をすることではなく、次は最後までやり遂げることにある。


6．責任感
                                                                                                                                                                              「自分が与えられた範囲をやり遂げようとする気持ち」である。
                                                                                                                                                                              責任感があるとは**「結果を出すこと、完了させることに集中できている状態」**。
                                                                                                                                                                              主体的になんでもかんでも仕事を受けて後でできていませんというのは責任感があるようで無責任である。仕事を引き受けても期日通りに完了できなければ無責任。できなそうなら相談して上長の判断に従う。


7．責任の大きさと見える景色
                                                                                                                                                                              責任の大きさによって、遠く（未来）を見て、アクションをしないといけない。
                                                                                                                                                                              経営者が最も遠く（未来）を見て行動を決め、レギュラーメンバーは最も近く（今）を見て行動を決める。
                                                                                                                                                                              それは役職や階層の違いによる役割の違いである。
                                                                                                                                                                              未来に何か障害が発生しそうなら、今はいったん我慢を強いないといけない場合もある。
                                                                                                                                                                              見ている景色が違う以上上長の判断について部下側が正しいか正しくないかは正確には判断ができないものである。


8．責任と権限の関係
                                                                                                                                                                              権限は裁量であり、責任を果たすために必要なものである。
                                                                                                                                                                              したがって、責任と権限の範囲は一致していないといけない。
                                                                                                                                                                              責任がないところに権限があると無責の状態が生まれてしまうので、抑制が効かなくなりやすい。
                                                                                                                                                                              例：自分の財布からでるお金は節約するが、他人が買ってくれる場合、節約しにくい。
                                                                                                                                                                              裁量を与えることはメンバーの育成にとっていいと、諸々の書籍にも記述があるが、同時に同じ範囲において責任を与える必要がある。
                                                                                                                                                                              権限は責任を果たすために、責任を課された者が獲得しにくるべきものである。（どうしたら果たせそうか考え、不足するなら採りに行く）
                                                                                                                                                                              部下側からみて、権限がないから、責任が果たせないという考えは成り立たない。十分な権限があるかどうかは上長が判断すべきものであり、「権限がないからできない」は免責している状態。


9．免責
                                                                                                                                                                              責任がないと錯覚している状態を指す。
                                                                                                                                                                              本来は責任があるにも関わらず自分に責任がないと錯覚をしている状態であり、つまり自身の責任範囲に対して無責任な状態になってしまっている。
免責している例
                                                                                                                                                                              部下に任せたら自分の責任がなくなったように錯覚し、後はよろしく、という気持ちになる。
                                                                                                                                                                              他の部署に依頼したから、他の部署に責任があるように感じている状態。（実際結果に対して責任がある）


10．無責
                                                                                                                                                                              その領域に対して責任がないこと、または責任を持っている人がいない状態を無責といい、無責の人による言動を無責の権限行使という。
無責の権限行使の例
                                                                                                                                                                              管理職が別の管轄のメンバーに対して指示をすること（責任のない状態での指示になる）。


11．自責と他責
                                                                                                                                                                              自責：自分に責任があると捉える姿勢。物事がうまくいかなかったとき、他人や環境ではなく**「自分の行動・判断・準備」に原因**があると考える。自分で変えられる点にフォーカスするため、成長や改善に繋がりやすい。
                                                                                                                                                                              他責：責任を他人や外部環境に押し付ける姿勢。失敗や問題を**「上司が悪い」「部下が無能」「環境が悪い」**などと外部のせいにする。自分は変えず、改善の意欲や行動が生まれにくい。チーム内の信頼や協力関係を損なうこともある。
自責の例
                                                                                                                                                                              「伝わらなかったのは、自分の説明の仕方が悪かったのかもしれない」
                                                                                                                                                                              「トラブルが起きたのは、事前の確認が不十分だったからだ」
他責の例
                                                                                                                                                                              「自分は悪くない。あの人がもっとしっかりしていれば…」
                                                                                                                                                                              「こんなに忙しいのにサポートがないから無理だ」
補足
                                                                                                                                                                              自責の姿勢が成長や信頼、結果につながっていく。重要な考え方。
                                                                                                                                                                              自責で考えるということは自分でコントロールできない外部環境のことを考えることではなく、自分にできることに集中しようという考え。
                                                                                                                                                                              留意事項：自責は「自分に責任がある」と表記されることから、自分を責め、ただただ悲観視する場合があるが、落ち込むことを求めるものではなく、行動変化を起こそうと考えるもの。


12．自己評価と他者評価
                                                                                                                                                                              自分から見た自分の評価を自己評価、他者から見た自分の評価が他者評価とする。
                                                                                                                                                                              メンバーは社会に貢献する、組織に貢献する、ということを求められる以上、他者評価をあげないといけない。自己評価がどれだけ高くても、他者評価が高くない限り、貢献できていないと考える。
                                                                                                                                                                              自分の仕事上の価値（役割価値）は他者が決めるものであり、自分では決められない。人間価値の話と混同しない。
                                                                                                                                                                              自己評価は他者からの評価より高くなる傾向にある。他者評価が本当の役割としての評価であるためそれを受け入れることが重要。
                                                                                                                                                                              他者評価を上げるために努力をするから成長する。


13．人間価値と役割価値
                                                                                                                                                                              人間価値：その人が「存在しているだけで持っている」尊厳や価値。年齢・性別・能力・役職などに関係なく、すべての人に平等にある命の価値。
                                                                                                                                                                              役割価値：組織や社会でどんな働きをしているかによって生まれる価値。貢献・成果・機能によって変動し、評価に反映される。
                                                                                                                                                                              仕事する中で、どんなに結果がでなくても人間価値を奪われない。人間としての価値はずっと存在している。
                                                                                                                                                                              自分に価値がないというのを、人間価値と役割価値の二つに分けて考えるべき。


14．利他的と利己的
利他的と利己的の違いは以下の通り。
利己的
                                                                                                                                                                              定義：自分の利益や欲求を優先して行動すること。
                                                                                                                                                                              特徴：自分の得になることを最優先する／他人の損失や不利益には無関心な場合が多い／短期的には効率的だが、長期的には信頼を失うリスクがある。
                                                                                                                                                                              例：自分だけが得するように振る舞う／チームの成果より自分の評価を優先する。
利他的
                                                                                                                                                                              定義：他者の利益や幸福を優先して行動すること。
                                                                                                                                                                              特徴：自分の利益を犠牲にしても他人を助ける／社会的評価や信頼を得やすい／「共感」「思いやり」に基づく行動。
                                                                                                                                                                              例：チームのために自分の時間を使う。
補足
                                                                                                                                                                              利己的だけではいけない。チームのためにという考えをもっていないといけないという観点では利他的である必要がある。
                                                                                                                                                                              誰かのために行動することで、自分も幸福感を得るという意味での利己であれば、それは必ずしも利己ではない。これを互恵的利他という。
                                                                                                                                                                              互恵的利他は利己と純粋利他の間にある。
                                                                                                                                                                              むしろ人間は本来利己的な生き物ではあるため、純粋利他でなくても互恵的利他に発展させるべき。周囲に対して何か貢献することで自分のためになるということであれば問題ない。


15．一個飛ばし
                                                                                                                                                                              組織図上の階層の上下を一つ飛ばしてコミュニケーションをとること。
                                                                                                                                                                              一個飛ばしをすると以下のような弊害が生まれるから望ましくない。ただし、必ず避けるわけではなくメリットとデメリットを比較して実施する。
                                                                                                                                                                              一緒に面談をするなどで極力弊害を減らすなど。
                                                                                                                                                                              退職を検討している場合などは一個飛ばしを行うことは問題ないと考える。
一個飛ばしの弊害
                                                                                                                                                                              1. 中間管理職の免責：本来、部下を指導・統率すべき中間管理職が機能不全に陥り、自身を“存在しなくてもいい存在”と認識。結果、指導意識が薄れ、管理責任が欠如。
                                                                                                                                                                              2. 部下の同位意識：上長を通さず指示された部下は、自身が上長クラスの権限や評価を得ていると誤認し、直属の上長の指示を軽視。
                                                                                                                                                                              3. 上司が二人いる状態：部下が誰の指示に従うべきか混乱。都合のいい上司を選ぶようになり、組織としての整合性やルールが崩れる。


16．位置ずれ
                                                                                                                                                                              組織内において自分自身の立場や役割（＝「位置」）を誤解・錯覚して認識してしまうこと。
                                                                                                                                                                              例えば、レギュラーメンバーが拠点長と同位であると錯覚するなど。
                                                                                                                                                                              部下側が、上長の指示を軽んじたり、指示をお願いと錯覚している状態。その結果、チームの秩序や役割分担が乱れ、機能の低下につながる。
                                                                                                                                                                              位置ずれの例：同じレギュラーメンバーにも関わらず、有資格者は無資格者に対して上位にいるように錯覚する。


17．うちの会社とこの会社
                                                                                                                                                                              組織に入っているのに、外から見ているような人は自分たちの会社を外から見ている感覚で**「この会社」と表現し、組織の一員になっている感覚がある人は「うちの会社」**と表現する傾向にある。
                                                                                                                                                                              メンバーは組織の一員であり仲間である以上うちの会社と表現すること。


18. チームワーク
                                                                                                                                                                              チームワークとは、「自分の役割をこなせている人同士が、同じ目標のために協力すること」を指す。
                                                                                                                                                                              単なる「仲良しこよし」ではない。
                                                                                                                                                                              自分の役割を果たしていない者同士の協力には力がなく、それはチームワークとは呼べない。


19. 「役に立ちたい感」
                                                                                                                                                                              組織やパートナーに積極的に関与し、情熱を持ち、貢献したいと感じる状態（ビジョン共有、キャリア開発支援、承認文化の導入など）。
                                                                                                                                                                              役に立ちたい感が高まることで、チームは一体感を増し、メンバーの働きがいや生きがいに最終的につながっていく。離職にも大きく影響するものと考える。




20. 飲み会
                                                                                                                                                                              現場メンバーとの飲み会は、必須ではないが適度なタイミングであれば実施してもよいという考え。
                                                                                                                                                                              年１～２回程度がちょうどよい頻度である。


 メリット
                                                                                                                                                                              アットホームな状況を作ることができる。
→ 日常業務では見えにくい一面を知ることができ、心理的距離が縮まるという効果もある。
 デメリット
① 上長と部下の距離が近くなりすぎて、立場・位置関係がずれる
② 行きたくない人にとっては苦痛な時間になる
③ 不参加によって評価が下がる印象を与えたり、「行かない人はノリが悪い」という風土を生みかねない
④ 誘われない人が出てしまう可能性がある
⑤ 上長が特定の人をひいきしているように見えるリスクがある
 注意事項。
                                                                                                                                                                                 上記のデメリットを踏まえ、全員を対象に開催すること
                                                                                                                                                                                 ただし、参加は自由とし、不参加を理由に評価を下げてはならない。
                                                                                                                                                                                 上長が醜態をさらすと負の影響が大きいため、飲酒量は控えめにすること。
                                                                                                                                                                                 本当の信頼関係は仕事上での関係によってしか築けないという認識を持っておく → 飲み会はあくまで補助的なものであり、信頼構築の中心には「誠実な業務姿勢」がある。


21. 権限
                                                                                                                                                                                 権限は「与えられるもの」ではなく、「取りに行くもの」。
                                                                                                                                                                                 自分の役割や責任を果たすために必要であれば、上長に伝えて獲得しに行くべき。
                                                                                                                                                                                 「権限がないから責任が果たせない」ということはない。
                                                                                                                                                                                 上長に伝えた結果、権限が与えられなかったとしても、責任がなくなるわけではないことに注意が必要。
                                                                                                                                                                                 権限は獲得しに行くものであるが、権限が取れなくても責任は残る。


例：拠点で採用するメンバーについて
誰を採用するかの決定権が自分にはない場合
→ 採用決定権をもらいたいと上長に伝える。


それが「NG」とされたとしても、
●「拠点の目標達成ができなくても仕方ない」ということにはならない。
        ●与えられた環境で結果を出す責任がある。
ただし、採用の決定権がなくても、意見や事実を採用部に伝えることはできる。


22. 勝ちグセ・負けグセ
                                                                                                                                                                                 ずっと目標達成をしている組織は勝ちグセがつき、達成するのが当たり前の状態になる。未達成だとストレスを感じる組織になる。
                                                                                                                                                                                 一方、未達成が続いている組織は負けグセがつき、未達成を当然のように受け入れ、ストレスを感じなくなる。
                                                                                                                                                                                 勝ちグセも負けグセも思考の習慣である。
                                                                                                                                                                                 勝ちグセがある組織は自然とポジティブな連鎖を生み出し、挑戦し続ける文化を作る。
                                                                                                                                                                                 負けグセのある組織に所属しているメンバーは、日常にも影響を与え新しいことへの挑戦や取り組み姿勢に影響を与える。
                                                                                                                                                                                 メンバー個人の幸福のためにも勝ちグセのある組織を上長としては作っていかないといけない。
                                                                                                                                                                                 日ごろから目標達成を続けることで、負けグセから勝ちグセのある組織に変えることができる。


23.目標と評価
                                                                                                                                                                                 目標と評価は混同するが、異なる概念。
                                                                                                                                                                                 日常業務においては目標を追いかけて行動する。結果として、活動を踏まえて評価が決まる。
                                                                                                                                                                                 目標は一つか二つの数字だが、評価はそれだけとは限らずいろいろな結果や項目で決まる。
                                                                                                                                                                                 評価指標をすべて追いかけると散漫になり、すべてが中途半端になるため、目標を追いかける。
                                                                                                                                                                                 例：拠点長は新規パートナー数を目標に掲げて行動をする。結果として新規パートナー数だけではなく、収入や法令順守率や離職者数、または上長からの指示をどれだけ実施しているかなどの複数の項目で評価される。
                                                                                                                                                                                 評価される項目はいろいろあるが、それだと散漫になるため、目標というのを設定してそれを追いかける。その際に評価項目と同じ項目が目標になるかというとそうとは限らない。
                                                                                                                                                                                 ただし、目標を達成することは評価につながっていく必要はあるため、相関関係はある。
                                                                                                                                                                                 例：学年で５番以内に入ると評価されるとして、目標をテストで○点と定める。この場合、目標をクリアすると評価されるようにつながっている。


24.ロックする
                                                                                                                                                                                 やると決めること。
                                                                                                                                                                                 やらない、やれないという選択肢を排除すること。
                                                                                                                                                                                 やる以外の選択肢をなくすこと。
                                                                                                                                                                                 例：「一日10分の筋トレをすることをロックする」としたら、どんな状況だろうと必ずやると決め、実行すること。
                                                                                                                                                                                 行動をロックし、実行をしているうちに、無意識に行動をできるようになる。
                                                                                                                                                                                 同時に、決めた行動を実行できることを続けていると自分の自信になっていく。




Ⅱ．業務遂行関連
1．社会的手抜き（リンゲルマン効果）
                                                                                                                                                                                 集団の中にいるとき、個人の責任感が薄れ、努力の量が減る現象のこと。
                                                                                                                                                                                 「みんながやるから自分は少しサボっても大丈夫」と無意識に感じてしまう心理。
                                                                                                                                                                                 特に「誰がどれだけ貢献したかが見えにくい状況」で起こりやすい。
                                                                                                                                                                                 個人の責任が不明確なとき、グループの人数が多すぎるときに起こりやすい。
                                                                                                                                                                                 ひとりひとりの役割と責任を明確にすることや、定期的なフィードバックの機会を作ることで避けるようにする。
有名な実験例
                                                                                                                                                                                 フランスのロープ引き実験：1人でロープを引いたときより、複数人で引いたときの一人あたりの力が低下する現象が確認。
実際の例
                                                                                                                                                                                 会議で一部の人だけが発言し、他の人は黙っている。
                                                                                                                                                                                 気づいたけれど「誰かがやるだろう」と仕事を放置する。
                                                                                                                                                                                 パートナーの安全確認は誰かがやっているだろうと見守りがおろそかになる。
                                                                                                                                                                                 ダブルチェックがあるからと一人ひとりのチェックが甘くなる。
                                                                                                                                                                                 「みんなで協力して」という指示に対して、誰かがやってくれると思ってしまう。


2．水路化現象
                                                                                                                                                                                 私たちが仕事をするとき、ついつい無意識のうちにとってしまいがちな仕事の着手パターン。
                                                                                                                                                                                 これがあるから第二象限の仕事より第一象限の仕事が優先される。
                                                                                                                                                                                 こういう心理が働くものと思って、業務を進める必要がある。
典型パターン（傾向）
                                                                                                                                                                                 1. 難しい仕事より簡単な仕事
                                                                                                                                                                                 2. 時間のかかる仕事よりすぐ終わる仕事
                                                                                                                                                                                 3. 新しい仕事より慣れた仕事
                                                                                                                                                                                 4. 重要な仕事より期限が迫った仕事
                                                                                                                                                                                 5. 初めての仕事より慣れた仕事
                                                                                                                                                                                 6. 予定された仕事より突発の仕事


3．川下りと山登り
                                                                                                                                                                                 マネジャーの仕事の仕方として、大きく山登り型と川下り型に分類される。
                                                                                                                                                                                 山登り型はより将来を考えているため、第二象限に該当するものが多く、川下り型は近い未来を考えて動くため、第一象限に近い。
                                                                                                                                                                                 マネジャーとしてはどちらも求められるが、特に組織での階層上位の者ほど山登り型の要素を多くもった仕事の仕方をしないといけない。（バランスの問題）
山登り型 …「目標志向」
                                                                                                                                                                                 本質：ゴール（山頂）を目指して登ること
                                                                                                                                                                                 ニュアンス：主体的・挑戦的。自分たちが「到達したい未来」を設定して努力する。
                                                                                                                                                                                 行動イメージ：事業の未来を描いてそれに向かっていく、大きな成長目標を掲げる、理念やビジョンに向かって進む。
川下り型 …「問題対応型」
                                                                                                                                                                                 本質：流れに乗って進むが、石や渦などの障害があれば避ける
                                                                                                                                                                                 ニュアンス：受動的・対応的。環境の変化や問題に合わせて行動する。
